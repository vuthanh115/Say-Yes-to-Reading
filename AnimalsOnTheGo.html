<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animals on the Go - National Geographic Kids</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Comic+Neue:wght@700&display=swap');

        :root {
            --primary: #22c55e;
            --primary-light: #dcfce7;
            --primary-dark: #15803d;
            --secondary: #f59e0b;
            --accent: #0ea5e9;
            --bg-color: #f0fdf4; 
            --text-main: #1e293b;
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { 
            background: linear-gradient(135deg, #f0fdf4 0%, #ccfbf1 100%);
            color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        header {
            background: var(--primary); color: white; padding: 15px; text-align: center;
            border-bottom: 6px solid var(--primary-dark); box-shadow: 0 4px 15px rgba(0,0,0,0.15); z-index: 10;
        }
        header h1 { font-family: 'Comic Neue', cursive; font-size: 1.9rem; text-transform: uppercase; color: #fef08a; text-shadow: 1px 2px 0px var(--primary-dark);}
        header p { font-size: 0.95rem; font-weight: 800; color: #dcfce7; }

        main { flex: 1; overflow-y: auto; padding: 20px 15px 120px 15px; display: flex; flex-direction: column; align-items: center; }
        
        .section { display: none; width: 100%; max-width: 500px; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .section.active { display: block; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .btn {
            background: var(--secondary); color: white; border: none; padding: 12px 20px;
            border-radius: 15px; font-weight: 900; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 5px 0 #b45309; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:active { transform: translateY(5px); box-shadow: none; }
        .btn-outline { background: white; color: var(--primary-dark); border: 3px solid var(--primary); box-shadow: 0 5px 0 var(--primary-dark); }

        .flashcard {
            background: var(--card-bg); border-radius: 20px; padding: 25px 20px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 6px solid var(--primary-light);
            position: relative; min-height: 520px; display: flex; flex-direction: column; align-items: center;
        }
        
        .fact-badge {
            background: #fef3c7; color: #b45309; padding: 10px 15px; border-radius: 15px;
            font-weight: 800; font-size: 0.95rem; border: 2px dashed #f59e0b; margin-bottom: 10px; font-style: italic; line-height: 1.3;
        }

        .animal-icon { font-size: 6rem; margin: 5px 0 10px 0; cursor: pointer; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); filter: drop-shadow(0 8px 10px rgba(0,0,0,0.1)); }
        
        /* New style for Action word with speaker icon */
        .action-word-btn { 
            font-size: 1rem; color: white; background: var(--accent); padding: 10px 20px; 
            border-radius: 20px; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; 
            box-shadow: 0 4px 0 #0284c7; line-height: 1.2; cursor: pointer; border: none;
            display: inline-flex; align-items: center; gap: 10px;
        }
        .action-word-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #0284c7; }

        .en-text { font-size: 1.2rem; font-weight: 900; color: var(--text-main); line-height: 1.4; margin-bottom: 10px; }
        .vi-text { font-size: 1.05rem; font-weight: 700; color: var(--primary-dark); margin-bottom: 20px; display: none; line-height: 1.4; border-top: 1px dashed #cbd5e1; padding-top: 10px; }
        .vi-text.show { display: block; animation: fadeIn 0.3s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .flip-card { background-color: transparent; height: 210px; perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-front, .flip-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px;
            box-shadow: 0 6px 0 rgba(0,0,0,0.05); border: 3px solid var(--primary-light); background: white;
        }
        .flip-back { background: var(--primary-light); color: var(--primary-dark); transform: rotateY(180deg); border-color: var(--primary); box-shadow: 0 6px 0 var(--primary-dark);}

        nav {
            position: fixed; bottom: 0; width: 100%; background: white; border-top: 4px solid var(--primary);
            display: flex; justify-content: space-around; padding: 10px 10px 30px 10px; z-index: 100; box-shadow: 0 -4px 15px rgba(0,0,0,0.05);
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 0.9rem; font-weight: 900; gap: 4px; cursor: pointer; transition: 0.3s; flex: 1; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 1.5rem; padding: 5px 20px; border-radius: 12px; transition: 0.3s; }
        .nav-item.active .nav-icon { background: var(--primary-light); transform: translateY(-3px); }

        #leaf-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 200; overflow: hidden; display: none; }
        .leaf { position: absolute; font-size: 2rem; animation: fall ease-in forwards; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg) translateX(50px); opacity: 0; } }
    </style>
</head>
<body>

    <header>
        <h1>Animals On The Go 🌍</h1>
        <p>National Geographic Kids</p>
    </header>

    <div id="leaf-container"></div>

    <main>
        <div id="tab-read" class="section active">
            <div style="text-align: center; margin-bottom: 10px; font-weight: 900; color: var(--primary-dark);" id="page-indicator">Animal 1 / 11</div>
            <div class="flashcard">
                <div id="fact-badge" class="fact-badge"></div>
                <div class="animal-icon" id="animal-icon" onclick="pokeAnimal()">🦩</div>
                
                <button id="action-word" class="action-word-btn" onclick="speakAction()">
                    WALKS /wɔːks/ 🔊
                </button>

                <div class="en-text" id="en-text">English</div>
                <div class="vi-text" id="vi-text">Vietnamese</div>
                
                <div style="margin-top: auto; display: flex; gap: 10px; width: 100%;">
                    <button class="btn btn-outline" style="flex: 1;" onclick="toggleVi()">E/V 🌐</button>
                    <button class="btn" style="flex: 2;" onclick="readText()">🔊 Listen</button>
                </div>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 20px; padding-bottom: 25px; width: 100%; gap: 15px;">
                <button class="btn btn-outline" style="flex: 1; min-height: 55px;" onclick="prevCard()">⬅️ Back</button>
                <button class="btn btn-outline" style="flex: 1; min-height: 55px;" onclick="nextCard()">Next ➡️</button>
            </div>
        </div>

        <div id="tab-vocab" class="section">
            <div class="vocab-grid" id="vocab-container"></div>
        </div>

        <div id="tab-game" class="section">
            <div class="question-box" style="background: white; padding: 20px; border-radius: 15px; border: 4px solid var(--secondary); text-align: center; font-size: 1.25rem; font-weight: 900; margin-bottom: 20px; color: var(--text-main); box-shadow: 0 4px 0 #d97706;" id="quiz-question">How do they move?</div>
            <div class="options-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;" id="quiz-options"></div>
            <button class="btn" style="width: 100%; margin-top: 25px; background: var(--primary); color: white; box-shadow: 0 5px 0 var(--primary-dark);" onclick="initGame()">Restart Game 🔄</button>
        </div>
    </main>

    <nav>
        <div class="nav-item active" onclick="switchTab('read', this)">
            <div class="nav-icon">📖</div><span>Read</span>
        </div>
        <div class="nav-item" onclick="switchTab('vocab', this)">
            <div class="nav-icon">🐾</div><span>Vocab</span>
        </div>
        <div class="nav-item" onclick="switchTab('game', this)">
            <div class="nav-icon">🎮</div><span>Game</span>
        </div>
    </nav>

    <script>
        const animalData = [
            { id: "ostrich", w: "Ostrich", w_ipa: "/ˈɒs.trɪtʃ/", vi: "Đà điểu", icon: "🦩", action: "Walks", a_ipa: "/wɔːks/", a_vi: "Đi bộ", en: "An ostrich walks on two long legs.", vi_sen: "Một con đà điểu đi bộ trên hai cái chân dài.", fact: "I am the original big bird!" },
            { id: "snake", w: "Snake", w_ipa: "/sneɪk/", vi: "Con rắn", icon: "🐍", action: "Slithers", a_ipa: "/ˈslɪð.ərz/", a_vi: "Trườn", en: "A snake slithers across the rocks.", vi_sen: "Con rắn trườn qua những tảng đá.", fact: "Snakes wiggle back and forth to move. Can you wiggle like a snake?" },
            { id: "ladybug", w: "Ladybug", w_ipa: "/ˈleɪ.di.bʌɡ/", vi: "Bọ rùa", icon: "🐞", action: "Crawls", a_ipa: "/krɔːlz/", a_vi: "Bò", en: "Ladybugs crawl up, down, and over flowers.", vi_sen: "Bọ rùa bò lên, xuống và băng qua những bông hoa.", fact: "I can fly, too!" },
            { id: "kangaroo", w: "Kangaroo", w_ipa: "/ˌkæŋ.ɡərˈuː/", vi: "Chuột túi", icon: "🦘", action: "Hops", a_ipa: "/hɒps/", a_vi: "Nhảy bằng 2 chân", en: "A kangaroo hop, hop, hops across the field.", vi_sen: "Chuột túi nhảy qua cánh đồng.", fact: "Kangaroos always hop with both feet. Can you hop like a kangaroo?" },
            { id: "penguin", w: "Penguins", w_ipa: "/ˈpeŋ.ɡwɪnz/", vi: "Chim cánh cụt", icon: "🐧", action: "Slide", a_ipa: "/slaɪd/", a_vi: "Trượt", en: "Penguins slide across the snow on their bellies.", vi_sen: "Chim cánh cụt trượt trên tuyết bằng bụng.", fact: "Can I get a little push?" },
            { id: "dolphin", w: "Dolphins", w_ipa: "/ˈdɒl.fɪnz/", vi: "Cá heo", icon: "🐬", action: "Jump", a_ipa: "/dʒʌmp/", a_vi: "Nhảy vọt", en: "Dolphins jump and splash in the water. Dolphins use their tails to swim and jump.", vi_sen: "Cá heo nhảy và té nước tung tóe. Cá heo dùng đuôi để bơi và nhảy.", fact: "Touch each dolphin's tail." },
            { id: "orangutan", w: "Orangutans", w_ipa: "/ɔːˈræŋ.uːtæn/", vi: "Đười ươi", icon: "🦧", action: "Swings", a_ipa: "/swɪŋz/", a_vi: "Đu mình", en: "An orangutan swings from branch to branch.", vi_sen: "Đười ươi đu từ cành này sang cành khác.", fact: "Just swinging by to say hi!" },
            { id: "seaturtle", w: "Sea Turtle", w_ipa: "/ˈsiː ˌtɜː.təl/", vi: "Rùa biển", icon: "🐢", action: "Flaps", a_ipa: "/flæps/", a_vi: "Đập (vây)", en: "A sea turtle flaps its flippers to swim.", vi_sen: "Rùa biển đập đôi vây chèo để bơi.", fact: "Flap your arms up and down to swim like a sea turtle." },
            { id: "butterfly", w: "Butterfly", w_ipa: "/ˈbʌt.ə.flaɪ/", vi: "Con bướm", icon: "🦋", action: "Flutters", a_ipa: "/ˈflʌt.ərz/", a_vi: "Vỗ cánh nhẹ", en: "A butterfly flutters its wings to fly.", vi_sen: "Bướm vỗ cánh để bay.", fact: "Hello, friend! The butterfly has spots on its wings. Do you see another animal with spots?" },
            { id: "bear", w: "Black Bears", w_ipa: "/blæk beərz/", vi: "Gấu đen", icon: "🐻", action: "Climb", a_ipa: "/klaɪm/", a_vi: "Trèo", en: "Black bears climb up and down trees.", vi_sen: "Gấu đen trèo lên và trèo xuống cây.", fact: "Can you lend me a paw?" },
            { id: "cheetah", w: "Cheetah", w_ipa: "/ˈtʃiː.tə/", vi: "Báo săn", icon: "🐆", action: "Runs", a_ipa: "/rʌnz/", a_vi: "Chạy", en: "A cheetah runs on four fast legs.", vi_sen: "Báo săn chạy bằng bốn cái chân rất nhanh.", fact: "How do you like to move?" }
        ];

        const quizQuestions = [
            { q: "Which animal slithers across rocks? 🪨", ans: "snake" },
            { q: "Which animal hops with both feet? 🌾", ans: "kangaroo" },
            { q: "Which animal slides on its belly? ❄️", ans: "penguin" },
            { q: "Which animal swings from branch to branch? 🌳", ans: "orangutan" },
            { q: "Which animal flaps its flippers to swim? 🌊", ans: "seaturtle" },
            { q: "Which animal climbs up and down trees? 🌲", ans: "bear" }
        ];

        function speak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US'; u.rate = 0.85;
            window.speechSynthesis.speak(u);
        }

        function switchTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(id === 'game') initGame();
        }

        let currCard = 0;
        let showVi = false;

        function renderCard() {
            const data = animalData[currCard];
            document.getElementById('page-indicator').innerText = `Animal ${currCard + 1} / ${animalData.length}`;
            document.getElementById('animal-icon').innerText = data.icon;
            document.getElementById('action-word').innerHTML = `${data.action} ${data.a_ipa} 🔊`;
            document.getElementById('en-text').innerText = data.en;
            document.getElementById('vi-text').innerText = data.vi_sen;
            
            const badge = document.getElementById('fact-badge');
            badge.style.display = data.fact ? 'block' : 'none';
            badge.innerText = `💡 ${data.fact}`;
            updateViVisibility();
        }

        function toggleVi() { showVi = !showVi; updateViVisibility(); }
        function updateViVisibility() {
            const viEl = document.getElementById('vi-text');
            viEl.classList.toggle('show', showVi);
        }

        function nextCard() { currCard = (currCard + 1) % animalData.length; showVi = false; renderCard(); }
        function prevCard() { currCard = (currCard - 1 + animalData.length) % animalData.length; showVi = false; renderCard(); }
        
        function readText() { speak(animalData[currCard].en + " " + animalData[currCard].fact); }
        
        // Function to only speak the action word
        function speakAction() { speak(animalData[currCard].action); }
        
        function pokeAnimal() { speak(animalData[currCard].w); }

        const vocabContainer = document.getElementById('vocab-container');
        animalData.forEach(item => {
            const div = document.createElement('div');
            div.className = 'flip-card';
            div.innerHTML = `
                <div class="flip-card-inner">
                    <div class="flip-front">
                        <div style="font-size: 3rem; margin-bottom: 5px;">${item.icon}</div>
                        <h3 style="color: var(--text-main); font-size: 1.1rem; font-weight: 900;">${item.w}</h3>
                        <div style="color: #64748b; font-size: 0.8rem; font-weight: 700; margin-bottom: 5px;">${item.w_ipa}</div>
                        <div style="color: var(--accent); font-weight: 800; font-size: 0.85rem; line-height: 1.2;">(${item.action} ${item.a_ipa}<br>-> ${item.a_vi})</div>
                        <button class="btn btn-outline" style="position: absolute; top: 8px; right: 8px; padding: 4px; border-radius: 8px; min-width: 32px; border-width: 2px;" onclick="event.stopPropagation(); speak('${item.w} ${item.action}')">🔊</button>
                    </div>
                    <div class="flip-back">
                        <h3 style="font-size: 1.3rem;">${item.vi}</h3>
                    </div>
                </div>`;
            div.onclick = () => div.classList.toggle('flipped');
            vocabContainer.appendChild(div);
        });

        let currQuiz = 0;
        let shuffledQuiz = [];

        function initGame() {
            shuffledQuiz = [...quizQuestions].sort(() => Math.random() - 0.5);
            currQuiz = 0;
            document.getElementById('leaf-container').style.display = 'none';
            loadQuiz();
        }

        function loadQuiz() {
            if(currQuiz >= shuffledQuiz.length) {
                document.getElementById('quiz-question').innerText = "🏆 Safari Master! 🏆";
                document.getElementById('quiz-options').innerHTML = '';
                triggerLeaves();
                speak("Great job!");
                return;
            }
            const q = shuffledQuiz[currQuiz];
            document.getElementById('quiz-question').innerText = q.q;
            speak(q.q);
            const optionsGrid = document.getElementById('quiz-options');
            optionsGrid.innerHTML = '';
            let opts = animalData.map(v => v.id).sort(() => Math.random() - 0.5).slice(0, 4);
            if(!opts.includes(q.ans)) opts[0] = q.ans; 
            opts.sort(() => Math.random() - 0.5).forEach(optId => {
                const vData = animalData.find(v => v.id === optId);
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.style = "background: white; border: 3px solid #cbd5e1; border-radius: 15px; padding: 15px; font-size: 3rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; box-shadow: 0 5px 0 #94a3b8;";
                btn.innerHTML = `${vData.icon}<span style="font-size: 1.1rem; font-weight: 900; color: var(--text-main);">${vData.action}</span>`;
                btn.onclick = () => checkAnswer(btn, optId, q.ans);
                optionsGrid.appendChild(btn);
            });
        }

        function checkAnswer(btn, selected, correct) {
            if(selected === correct) {
                btn.style.background = "#dcfce7"; btn.style.borderColor = "#22c55e";
                speak("Correct!"); setTimeout(() => { currQuiz++; loadQuiz(); }, 1200);
            } else {
                btn.style.background = "#fee2e2"; btn.style.borderColor = "#ef4444";
                speak("Try again!"); setTimeout(() => { btn.style.background = "white"; btn.style.borderColor = "#cbd5e1"; }, 500);
            }
        }

        function triggerLeaves() {
            const container = document.getElementById('leaf-container');
            container.innerHTML = ''; container.style.display = 'block';
            const leaves = ['🌿', '🍃', '🌴', '🐾'];
            for(let i=0; i<30; i++) {
                const el = document.createElement('div');
                el.className = 'leaf'; el.innerText = leaves[Math.floor(Math.random() * leaves.length)];
                el.style.left = `${Math.random() * 100}vw`; el.style.animationDuration = `${Math.random() * 3 + 2}s`;
                container.appendChild(el);
            }
        }
        renderCard();
    </script>
</body>
</html>
