<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bedtime - National Geographic Kids</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Comic+Neue:wght@700&display=swap');

        :root {
            --primary: #312e81; 
            --primary-light: #e0e7ff;
            --primary-dark: #1e1b4b;
            --secondary: #8b5cf6; 
            --accent: #fde047; 
            --bg-color: #0f172a; 
            --text-main: #334155;
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        body { 
            background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 100%);
            color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }
        
        header {
            background: rgba(30, 27, 75, 0.85); backdrop-filter: blur(10px);
            color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--secondary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 10;
        }
        header h1 { font-family: 'Comic Neue', cursive; font-size: 1.8rem; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); text-shadow: 0 0 10px rgba(253, 224, 71, 0.5);}
        header p { font-size: 0.95rem; font-weight: 800; color: var(--primary-light); }

        main { flex: 1; overflow-y: auto; padding: 20px 15px 100px 15px; display: flex; flex-direction: column; align-items: center; z-index: 5; }
        
        .section { display: none; width: 100%; max-width: 500px; animation: fadeUp 0.5s ease forwards; }
        .section.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- BUTTONS --- */
        .btn {
            background: var(--secondary); color: white; border: none; padding: 12px 20px;
            border-radius: 15px; font-weight: 900; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 5px 0 #5b21b6; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:active { transform: translateY(5px); box-shadow: none; }
        .btn-outline { background: var(--primary-light); color: var(--primary-dark); border: 3px solid var(--primary-light); box-shadow: 0 5px 0 #94a3b8; }

        /* --- FLASHCARD --- */
        .flashcard {
            background: var(--card-bg); border-radius: 20px; padding: 25px 20px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 6px solid var(--secondary);
            position: relative; min-height: 520px; display: flex; flex-direction: column; align-items: center; color: var(--text-main);
        }
        
        .fact-badge {
            background: #fffbeb; color: #854d0e; padding: 10px 15px; border-radius: 15px;
            font-weight: 800; font-size: 0.9rem; border: 2px dashed #f59e0b; margin-bottom: 10px; font-style: italic; line-height: 1.3;
        }

        .animal-icon { font-size: 6rem; margin: 5px 0; cursor: pointer; transition: transform 0.3s ease; text-shadow: 0px 10px 15px rgba(0,0,0,0.2); }
        .animal-icon:active { transform: scale(0.9) translateY(5px); }
        
        .en-text { font-size: 1.15rem; font-weight: 900; color: var(--primary-dark); line-height: 1.4; margin-bottom: 10px; }
        .vi-text { font-size: 1.05rem; font-weight: 700; color: var(--secondary); margin-bottom: 20px; display: none; line-height: 1.4; border-top: 1px dashed #cbd5e1; padding-top: 10px; }
        .vi-text.show { display: block; animation: fadeIn 0.3s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- VOCAB GRID --- */
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .flip-card { background-color: transparent; height: 180px; perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-front, .flip-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3); border: 3px solid var(--secondary); background: white; color: var(--text-main);
        }
        .flip-back { background: var(--secondary); color: white; transform: rotateY(180deg); border-color: var(--primary-light); box-shadow: 0 6px 15px rgba(0,0,0,0.5);}

        /* --- BOTTOM NAV --- */
        nav {
            position: fixed; bottom: 0; width: 100%; background: var(--primary-dark); border-top: 4px solid var(--secondary);
            display: flex; justify-content: space-around; padding: 10px 10px 25px 10px; z-index: 100; box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 0.9rem; font-weight: 900; gap: 4px; cursor: pointer; transition: 0.3s; flex: 1; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 1.5rem; padding: 5px 20px; border-radius: 12px; transition: 0.3s; }
        .nav-item.active .nav-icon { background: rgba(253, 224, 71, 0.2); transform: translateY(-3px); }

        /* STARS EFFECT */
        #stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; display: none; }
        .star { position: absolute; font-size: 1.5rem; animation: twinkle linear forwards; color: var(--accent); text-shadow: 0 0 5px var(--accent); }
        @keyframes twinkle { 0% { transform: translateY(-10vh) scale(0.5); opacity: 0; } 50% { opacity: 1; transform: scale(1.2); } 100% { transform: translateY(110vh) scale(0.5); opacity: 0; } }
    </style>
</head>
<body>

    <header>
        <h1>Bedtime 🌙</h1>
        <p>National Geographic Kids</p>
    </header>

    <div id="stars-container"></div>

    <main>
        <div id="tab-read" class="section active">
            <div style="text-align: center; margin-bottom: 10px; font-weight: 900; color: var(--accent);" id="page-indicator">Animal 1 / 5</div>
            <div class="flashcard">
                <div id="fact-badge" class="fact-badge"></div>
                <div class="animal-icon" id="animal-icon" onclick="yawnSound()">🦢</div>
                <div class="en-text" id="en-text">English</div>
                <div class="vi-text" id="vi-text">Vietnamese</div>
                
                <div style="margin-top: auto; display: flex; gap: 10px; width: 100%;">
                    <button class="btn btn-outline" style="flex: 1;" onclick="toggleVi()">E/V 🌐</button>
                    <button class="btn" style="flex: 2;" onclick="readText()">🔊 Listen</button>
                </div>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 20px;">
                <button class="btn btn-outline" style="background: rgba(255,255,255,0.1); color: white; border-color: rgba(255,255,255,0.3); box-shadow: 0 5px 0 rgba(0,0,0,0.3);" onclick="prevCard()">⬅️ Back</button>
                <button class="btn btn-outline" style="background: rgba(255,255,255,0.1); color: white; border-color: rgba(255,255,255,0.3); box-shadow: 0 5px 0 rgba(0,0,0,0.3);" onclick="nextCard()">Next ➡️</button>
            </div>
        </div>

        <div id="tab-vocab" class="section">
            <div class="vocab-grid" id="vocab-container"></div>
        </div>

        <div id="tab-game" class="section">
            <div class="question-box" id="quiz-question" style="background: var(--primary-dark); padding: 20px; border-radius: 15px; border: 3px solid var(--secondary); text-align: center; font-size: 1.2rem; font-weight: 900; color: white;">Which animal sleeps here?</div>
            <div class="options-grid" id="quiz-options" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;"></div>
            <button class="btn" style="width: 100%; margin-top: 25px; background: var(--accent); color: var(--primary-dark); box-shadow: 0 5px 0 #ca8a04;" onclick="initGame()">Restart Game 🔄</button>
        </div>
    </main>

    <nav>
        <div class="nav-item active" onclick="switchTab('read', this)">
            <div class="nav-icon">📖</div><span>Read</span>
        </div>
        <div class="nav-item" onclick="switchTab('vocab', this)">
            <div class="nav-icon">💤</div><span>Vocab</span>
        </div>
        <div class="nav-item" onclick="switchTab('game', this)">
            <div class="nav-icon">🎮</div><span>Game</span>
        </div>
    </nav>

    <script>
        // --- FULL DATA RESTORED ---
        const bedtimeData = [
            { 
                id: "swan", w: "Swans", vi: "Thiên nga", icon: "🦢", 
                en: "Baby swans swim with Mom and Dad. They look for bugs to eat. The tired baby swans climb onto Mom's back. They fall asleep under her soft wings. Good night, baby swans.", 
                vi_sen: "Thiên nga con bơi cùng bố và mẹ. Chúng đi tìm những chú bọ để ăn. Khi đã mệt, thiên nga con leo lên lưng mẹ. Chúng ngủ thiếp đi dưới đôi cánh mềm mại của mẹ. Chúc ngủ ngon nhé, thiên nga nhỏ.", 
                fact: "A baby swan stays safe and warm on its parent's back." 
            },
            { 
                id: "orangutan", w: "Orangutans", vi: "Đười ươi", icon: "🦧", 
                en: "A baby orangutan hangs from a branch. It watches its mother make a nest. Baby and Mom snuggle in their cozy bed. Sleep tight, orangutans.", 
                vi_sen: "Đười ươi con đu mình trên cành cây. Nó quan sát mẹ đang làm tổ. Hai mẹ con rúc vào nhau trên chiếc giường ấm cúng. Ngủ ngon nhé, các chú đười ươi.", 
                fact: "Orangutans build a new nest every night." 
            },
            { 
                id: "sealion", w: "Sea Lions", vi: "Sư tử biển", icon: "🦭", 
                en: "Baby sea lions play together on the beach. The sea lions curl up in the soft sand. Sweet dreams, sea lions.", 
                vi_sen: "Sư tử biển con cùng nhau chơi đùa trên bãi biển. Những chú sư tử biển cuộn tròn trên bãi cát mềm mại. Những giấc mơ ngọt ngào nhé, sư tử biển ơi.", 
                fact: "A baby sea lion can swim as soon as it is born." 
            },
            { 
                id: "polarbear", w: "Polar Bears", vi: "Gấu Bắc Cực", icon: "🐻‍❄️", 
                en: "Two baby polar bears follow their mom. The bears cuddle on a bed of snow. One baby is not ready to close its eyes. Go to bed, you sleepyhead.", 
                vi_sen: "Hai chú gấu bắc cực con lững thững đi theo mẹ. Những chú gấu âu yếm nhau trên chiếc giường đầy tuyết. Một chú gấu con vẫn chưa muốn nhắm mắt đâu. Đi ngủ thôi nào, đồ ngái ngủ ơi.", 
                fact: "Thick fur and lots of fat keep polar bears warm." 
            },
            { 
                id: "lion", w: "Lions", vi: "Sư tử", icon: "🦁", 
                en: "Mother lion gives her baby a bath before bedtime. A father lion takes care of the babies, too. Stretch. Yawn. Rest your head and go to sleep, baby lion.", 
                vi_sen: "Sư tử mẹ tắm cho con trước giờ đi ngủ. Sư tử bố cũng chăm sóc các con. Vươn vai nào. Ngáp một cái thật to. Hãy gối đầu và đi ngủ thôi, sư tử con ơi.", 
                fact: "A father lion takes care of the babies, too." 
            }
        ];

        const quizQuestions = [
            { q: "Which animal builds a new nest every night? 🪹", ans: "orangutan" },
            { q: "Which animal curls up in the soft sand? 🏖️", ans: "sealion" },
            { q: "Which animal cuddles on a bed of snow? ❄️", ans: "polarbear" },
            { q: "Which animal sleeps under mom's soft wings? 🪽", ans: "swan" },
            { q: "Which animal takes a bath before bedtime? 🛁", ans: "lion" }
        ];

        // --- SPEECH API ---
        function speak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US'; u.rate = 0.8; 
            window.speechSynthesis.speak(u);
        }

        // --- TAB MANAGEMENT ---
        function switchTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(id === 'game') initGame();
        }

        // --- READ TAB LOGIC ---
        let currCard = 0;
        let showVi = false;

        function renderCard() {
            const data = bedtimeData[currCard];
            document.getElementById('page-indicator').innerText = `Animal ${currCard + 1} / ${bedtimeData.length}`;
            document.getElementById('animal-icon').innerText = data.icon;
            document.getElementById('en-text').innerText = data.en;
            document.getElementById('vi-text').innerText = data.vi_sen;
            
            const badge = document.getElementById('fact-badge');
            if(data.fact) {
                badge.style.display = 'block';
                badge.innerText = `💡 ${data.fact}`;
            } else {
                badge.style.display = 'none';
            }
            updateViVisibility();
        }

        function toggleVi() { showVi = !showVi; updateViVisibility(); }
        function updateViVisibility() {
            const viEl = document.getElementById('vi-text');
            if(showVi) viEl.classList.add('show'); else viEl.classList.remove('show');
        }

        function nextCard() { currCard = (currCard + 1) % bedtimeData.length; showVi = false; renderCard(); }
        function prevCard() { currCard = (currCard - 1 + bedtimeData.length) % bedtimeData.length; showVi = false; renderCard(); }
        function readText() { 
            let txt = bedtimeData[currCard].en + " " + bedtimeData[currCard].fact;
            speak(txt); 
        }
        function yawnSound() {
            const icon = document.getElementById('animal-icon');
            icon.style.transform = 'scale(0.9) rotate(-5deg)';
            setTimeout(() => icon.style.transform = 'scale(1) rotate(0)', 300);
            speak("Yawn. Sleepy " + bedtimeData[currCard].w);
        }

        // --- VOCAB TAB LOGIC ---
        const vocabContainer = document.getElementById('vocab-container');
        bedtimeData.forEach(item => {
            const div = document.createElement('div');
            div.className = 'flip-card';
            div.innerHTML = `
                <div class="flip-card-inner">
                    <div class="flip-front">
                        <div style="font-size: 3.5rem; margin-bottom: 5px;">${item.icon}</div>
                        <h3 style="color: var(--text-main); font-size: 1.2rem; font-weight: 900;">${item.w}</h3>
                        <button class="btn btn-outline" style="position: absolute; top: 8px; right: 8px; padding: 4px; border-radius: 8px; min-width: 32px; border-width: 2px;" onclick="event.stopPropagation(); speak('${item.w}')">🔊</button>
                    </div>
                    <div class="flip-back">
                        <h3 style="font-size: 1.4rem;">${item.vi}</h3>
                    </div>
                </div>`;
            div.onclick = () => div.classList.toggle('flipped');
            vocabContainer.appendChild(div);
        });

        // --- GAME TAB LOGIC ---
        let currQuiz = 0;
        let shuffledQuiz = [];

        function initGame() {
            shuffledQuiz = [...quizQuestions].sort(() => Math.random() - 0.5);
            currQuiz = 0;
            document.getElementById('stars-container').style.display = 'none';
            loadQuiz();
        }

        function loadQuiz() {
            if(currQuiz >= shuffledQuiz.length) {
                document.getElementById('quiz-question').innerText = "🌙 Sweet Dreams! 🌙";
                document.getElementById('quiz-options').innerHTML = '';
                triggerStars();
                speak("Great job! Sweet dreams!");
                return;
            }

            const q = shuffledQuiz[currQuiz];
            document.getElementById('quiz-question').innerText = q.q;
            speak(q.q);

            const optionsGrid = document.getElementById('quiz-options');
            optionsGrid.innerHTML = '';
            
            let opts = bedtimeData.map(v => v.id);
            opts = opts.sort(() => Math.random() - 0.5).slice(0, 4);
            if(!opts.includes(q.ans)) opts[0] = q.ans; 
            opts.sort(() => Math.random() - 0.5); 

            opts.forEach(optId => {
                const vData = bedtimeData.find(v => v.id === optId);
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.style = "background: white; border: 3px solid var(--secondary); border-radius: 15px; padding: 15px; font-size: 3rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; box-shadow: 0 5px 0 #6d28d9;";
                btn.innerHTML = `${vData.icon}<span style="font-size: 1.1rem; font-weight: 900; color: var(--text-main);">${vData.w}</span>`;
                btn.onclick = () => checkAnswer(btn, optId, q.ans);
                optionsGrid.appendChild(btn);
            });
        }

        function checkAnswer(btn, selected, correct) {
            if(selected === correct) {
                btn.style.background = "#dcfce7";
                btn.style.borderColor = "#22c55e";
                speak("Correct! Good night.");
                setTimeout(() => { currQuiz++; loadQuiz(); }, 1200);
            } else {
                btn.style.background = "#fee2e2";
                btn.style.borderColor = "#ef4444";
                speak("Try again.");
                setTimeout(() => { btn.style.background = "white"; btn.style.borderColor = "var(--secondary)"; }, 500);
            }
        }

        function triggerStars() {
            const container = document.getElementById('stars-container');
            container.innerHTML = '';
            container.style.display = 'block';
            for(let i=0; i<40; i++) {
                const el = document.createElement('div');
                el.className = 'star';
                el.innerText = '✨';
                el.style.left = `${Math.random() * 100}vw`;
                el.style.animationDuration = `${Math.random() * 3 + 2}s`;
                el.style.animationDelay = `${Math.random() * 1}s`;
                container.appendChild(el);
            }
        }

        renderCard();
    </script>
</body>
</html>
