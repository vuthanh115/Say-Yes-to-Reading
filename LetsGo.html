<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Let's Go! - National Geographic Kids</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Comic+Neue:wght@700&display=swap');

        :root {
            --primary: #0ea5e9; /* Sky Blue */
            --primary-light: #e0f2fe;
            --primary-dark: #0284c7;
            --secondary: #f59e0b; /* Energetic Orange */
            --bg-color: #f0f9ff;
            --text-main: #0f172a;
            --card-bg: #ffffff;
            --safe-color: #10b981; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; padding: 15px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
            box-shadow: 0 5px 15px rgba(14, 165, 233, 0.3); z-index: 10; border-bottom: 4px solid var(--secondary);
        }
        header h1 { font-family: 'Comic Neue', cursive; font-size: 1.8rem; letter-spacing: 1px; text-transform: uppercase; }

        main { flex: 1; overflow-y: auto; padding: 15px 15px 130px 15px; display: flex; flex-direction: column; align-items: center; }
        
        .section { display: none; width: 100%; max-width: 500px; animation: slideUp 0.4s ease-out forwards; }
        .section.active { display: flex; flex-direction: column; align-items: center; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .btn {
            background: var(--secondary); color: white; border: none; padding: 12px 20px;
            border-radius: 15px; font-weight: 800; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 5px 0 #d97706; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-outline { background: white; color: var(--text-main); border: 3px solid #cbd5e1; box-shadow: 0 5px 0 #94a3b8; }

        /* --- FLASHCARD --- */
        .flashcard {
            background: var(--card-bg); border-radius: 30px; padding: 25px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 5px solid var(--primary-light);
            position: relative; min-height: 560px; display: flex; flex-direction: column; align-items: center;
        }
        
        .safety-badge {
            background: #d1fae5; color: #047857; padding: 10px 15px; border-radius: 20px; font-weight: 800;
            font-size: 0.9rem; border: 2px dashed #34d399; margin-bottom: 10px; display: inline-flex; align-items: center; gap: 5px; line-height: 1.3;
        }

        .vehicle-icon { font-size: 6.5rem; margin: 5px 0 10px 0; cursor: pointer; transition: transform 0.3s; }
        
        .name-badge-btn { 
            font-size: 1.1rem; color: white; background: var(--primary); padding: 12px 25px; 
            border-radius: 25px; font-weight: 900; margin-bottom: 15px; 
            box-shadow: 0 4px 0 var(--primary-dark); cursor: pointer; border: none;
            display: inline-flex; align-items: center; gap: 10px;
        }

        .en-text { font-size: 1.35rem; font-weight: 900; color: var(--primary-dark); line-height: 1.5; margin-bottom: 10px; text-align: left; width: 100%; }
        .vi-text { font-size: 1.2rem; font-weight: 700; color: #64748b; margin-bottom: 20px; display: none; line-height: 1.4; border-top: 1px dashed #cbd5e1; padding-top: 10px; text-align: left; width: 100%; }
        .vi-text.show { display: block; }

        /* --- VOCAB & GAME GRID --- */
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 15px; width: 100%; }
        .flip-card { background-color: transparent; height: 220px; perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-front, .flip-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); border: 3px solid var(--primary-light); background: white;
        }
        .flip-back { background: var(--primary-light); color: var(--primary-dark); transform: rotateY(180deg); border-color: var(--primary); }
        
        /* --- BOTTOM NAV --- */
        nav {
            position: fixed; bottom: 0; width: 100%; background: white; border-top: 2px solid #e2e8f0;
            display: flex; justify-content: space-around; padding: 10px 10px 35px 10px; z-index: 100;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.05); padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 0.9rem; font-weight: 800; flex: 1; cursor: pointer; gap: 4px; }
        .nav-item.active { color: var(--primary-dark); }
        .nav-icon { font-size: 1.5rem; padding: 5px 20px; border-radius: 12px; transition: 0.3s; }
        .nav-item.active .nav-icon { background: var(--primary-light); transform: translateY(-3px); }

        #plane-fly { position: fixed; top: 30%; left: -100px; font-size: 5rem; z-index: 200; pointer-events: none; display: none; }
        .fly-animation { display: block !important; animation: flyAcross 2.5s forwards; }
        @keyframes flyAcross { 0% { left: -100px; transform: translateY(0) rotate(10deg); } 50% { transform: translateY(-30px) rotate(0deg); } 100% { left: 120vw; transform: translateY(-50px) rotate(-10deg); } }
    </style>
</head>
<body>

    <header>
        <h1>Let's Go! 🚦</h1>
    </header>

    <div id="plane-fly">✈️☁️</div>

    <main>
        <div id="tab-read" class="section active">
            <div style="text-align: center; margin-bottom: 10px; font-weight: 800; color: var(--primary-dark);" id="page-indicator">Thẻ 1 / 7</div>
            <div class="flashcard">
                <div id="safety-badge" class="safety-badge" style="display: none;">🛡️ Safety First!</div>
                <div class="vehicle-icon" id="vehicle-icon" onclick="speakName()">🚲</div>
                
                <button id="name-badge" class="name-badge-btn" onclick="speakName()">
                    BIKE /baɪk/ 🔊
                </button>

                <div class="en-text" id="en-text">English</div>
                <div class="vi-text" id="vi-text">Vietnamese</div>
                
                <div style="margin-top: auto; display: flex; gap: 10px; width: 100%;">
                    <button class="btn btn-outline" style="flex: 1; min-height: 55px;" onclick="toggleVi()">E/V 🌐</button>
                    <button class="btn" style="flex: 2; min-height: 55px;" onclick="readText()">🔊 Listen All</button>
                </div>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 20px; padding-bottom: 35px; width: 100%; gap: 15px;">
                <button class="btn btn-outline" style="flex: 1; min-height: 65px;" onclick="prevCard()">⬅️ Back</button>
                <button class="btn btn-outline" style="flex: 1; min-height: 65px;" onclick="nextCard()">Next ➡️</button>
            </div>
        </div>

        <div id="tab-vocab" class="section">
            <div class="vocab-grid" id="vocab-container"></div>
        </div>

        <div id="tab-game" class="section">
            <div style="background: white; padding: 20px; border-radius: 20px; border: 3px solid var(--primary); text-align: center; font-size: 1.3rem; font-weight: 800; margin-bottom: 20px; color: var(--primary-dark);" id="quiz-question">What vehicle is this?</div>
            <div class="vocab-grid" id="quiz-options" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
            <button class="btn" style="width: 100%; margin-top: 25px;" onclick="initGame()">Restart Game 🔄</button>
        </div>
    </main>

    <nav>
        <div class="nav-item active" onclick="switchTab('read', this)">
            <div class="nav-icon">📖</div><span>Read</span>
        </div>
        <div class="nav-item" onclick="switchTab('vocab', this)">
            <div class="nav-icon">🔤</div><span>Vocab</span>
        </div>
        <div class="nav-item" onclick="switchTab('game', this)">
            <div class="nav-icon">🎮</div><span>Game</span>
        </div>
    </nav>

    <script>
        const vocabData = [
            { id: "bike", w: "BIKE", vi: "xe đạp", ipa: "/baɪk/", icon: "🚲" },
            { id: "car", w: "CAR", vi: "ô tô", ipa: "/kɑːr/", icon: "🚗" },
            { id: "bus", w: "BUS", vi: "xe buýt", ipa: "/bʌs/", icon: "🚌" },
            { id: "subway", w: "SUBWAY", vi: "tàu điện ngầm", ipa: "/ˈsʌb.weɪ/", icon: "🚇" },
            { id: "plane", w: "PLANE", vi: "máy bay", ipa: "/pleɪn/", icon: "✈️" }
        ];

        const storyData = [
            { v: "LET'S GO!", ipa: "", icon: "🚦", en: "Let's go! How? There are so many ways!", vi: "Đi thôi nào! Bằng cách nào nhỉ? Có rất nhiều cách đó!", safety: "" },
            { v: "BIKE", ipa: "/baɪk/", icon: "🚲", en: "Bikes are fun to ride. They move when you do. Pedal fast!", vi: "Xe đạp rất thú vị. Chúng di chuyển khi bạn đạp. Hãy đạp nhanh lên!", safety: "Helmets keep riders safe. So do hand signals." },
            { v: "CAR", ipa: "/kɑːr/", icon: "🚗", en: "Some people drive cars to get around. Cars can be small or big.", vi: "Một số người lái ô tô để đi lại. Ô tô có thể nhỏ hoặc to.", safety: "Always use a seat belt!" },
            { v: "BUS", ipa: "/bʌs/", icon: "🚌", en: "Sometimes many people travel together. Let's take a bus. Wait for me!", vi: "Đôi khi nhiều người đi cùng nhau. Hãy đi xe buýt nào. Đợi tớ với!", safety: "" },
            { v: "SUBWAY", ipa: "/ˈsʌb.weɪ/", icon: "🚇", en: "Others like to ride the busy subway. Whoosh!", vi: "Những người khác thích đi tàu điện ngầm đông đúc. Vù vù!", safety: "It's OK to stand, but hold on tight." },
            { v: "PLANE", ipa: "/pleɪn/", icon: "✈️", en: "Some people travel to places that are far away. The plane flies above the clouds. Look out the window!", vi: "Một số người đi đến những nơi rất xa. Máy bay bay trên những đám mây. Hãy nhìn ra ngoài cửa sổ nào!", safety: "" },
            { v: "YOUR TURN!", ipa: "", icon: "🎨", en: "Where do you want to go? Draw a picture of a place you want to go. What kind of vehicle will you take?", vi: "Bé muốn đi đâu nào? Hãy vẽ một bức tranh về nơi bé muốn đến nhé. Bé sẽ chọn phương tiện nào để đến đó nhỉ?", safety: "A bike, car, bus, subway, or plane?" }
        ];

        const quizData = [
            { q: "What has two wheels and needs you to pedal fast? 🚲", ans: "bike" },
            { q: "What flies high above the clouds? ☁️", ans: "plane" },
            { q: "What carries many students together to school? 🚌", ans: "bus" },
            { q: "Where must you always use a seat belt? 🚗", ans: "car" },
            { q: "What goes 'Whoosh' deep under the city? 🚇", ans: "subway" }
        ];

        function speak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US'; u.rate = 0.85;
            window.speechSynthesis.speak(u);
        }

        let currCard = 0;
        let showVi = false;

        function renderCard() {
            const data = storyData[currCard];
            document.getElementById('page-indicator').innerText = `Thẻ ${currCard + 1} / ${storyData.length}`;
            document.getElementById('vehicle-icon').innerText = data.icon;
            document.getElementById('name-badge').innerHTML = `${data.v} ${data.ipa} 🔊`;
            document.getElementById('en-text').innerText = data.en;
            document.getElementById('vi-text').innerText = data.vi;
            
            const badge = document.getElementById('safety-badge');
            if(data.safety) {
                badge.style.display = 'inline-flex';
                badge.innerText = `🛡️ ${data.safety}`;
            } else {
                badge.style.display = 'none';
            }
            updateViVisibility();
        }

        function toggleVi() { showVi = !showVi; updateViVisibility(); }
        function updateViVisibility() {
            const viEl = document.getElementById('vi-text');
            viEl.classList.toggle('show', showVi);
        }

        function nextCard() { currCard = (currCard + 1) % storyData.length; showVi = false; renderCard(); }
        function prevCard() { currCard = (currCard - 1 + storyData.length) % storyData.length; showVi = false; renderCard(); }
        
        function readText() { 
            let txt = storyData[currCard].en + ". " + storyData[currCard].safety;
            speak(txt); 
        }
        function speakName() { speak(storyData[currCard].v); }

        function switchTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(id === 'game') initGame();
        }

        const vocabContainer = document.getElementById('vocab-container');
        vocabData.forEach(item => {
            const div = document.createElement('div');
            div.className = 'flip-card';
            div.innerHTML = `
                <div class="flip-card-inner">
                    <div class="flip-front">
                        <div style="font-size: 3.5rem; margin-bottom: 5px;">${item.icon}</div>
                        <h3 style="font-weight: 900; font-size: 1.1rem;">${item.w}</h3>
                        <div style="color: #64748b; font-size: 0.85rem;">${item.ipa}</div>
                        <button style="position: absolute; top: 10px; right: 10px; border: none; background: none; font-size: 1.3rem;" onclick="event.stopPropagation(); speak('${item.w}')">🔊</button>
                    </div>
                    <div class="flip-back">
                        <h3 style="font-size: 1.3rem;">${item.vi}</h3>
                    </div>
                </div>`;
            div.onclick = () => div.classList.toggle('flipped');
            vocabContainer.appendChild(div);
        });

        let currQuiz = 0;
        let shuffledQuiz = [];

        function initGame() {
            shuffledQuiz = [...quizData].sort(() => Math.random() - 0.5);
            currQuiz = 0;
            loadQuiz();
        }

        function loadQuiz() {
            const quizContainer = document.getElementById('quiz-options');
            if(currQuiz >= shuffledQuiz.length) {
                document.getElementById('quiz-question').innerText = "🎉 Super Traveler! 🏆";
                quizContainer.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--primary-dark); font-size: 1.5rem; font-weight: 900;">You finished the game!</div>';
                return;
            }
            const q = shuffledQuiz[currQuiz];
            document.getElementById('quiz-question').innerText = q.q;
            speak(q.q);
            quizContainer.innerHTML = '';
            
            vocabData.forEach(vehicle => {
                const btn = document.createElement('div');
                btn.style = "background: white; border: 3px solid #cbd5e1; border-radius: 15px; padding: 15px; text-align: center; box-shadow: 0 4px 0 #94a3b8; cursor: pointer; color: var(--text-main);";
                btn.innerHTML = `<div style="font-size:2.5rem;">${vehicle.icon}</div><span style="font-weight:800; font-size:1rem;">${vehicle.w}</span>`;
                btn.onclick = () => {
                    if(vehicle.id === q.ans) {
                        btn.style.background = "#d1fae5"; btn.style.borderColor = "#10b981";
                        speak("Correct!");
                        setTimeout(() => { currQuiz++; loadQuiz(); }, 1200);
                    } else {
                        btn.style.background = "#fee2e2"; btn.style.borderColor = "#ef4444";
                        speak("Try again!");
                        setTimeout(() => { btn.style.background = "white"; btn.style.borderColor = "#cbd5e1"; }, 500);
                    }
                };
                quizContainer.appendChild(btn);
            });
        }
        renderCard();
    </script>
</body>
</html>
