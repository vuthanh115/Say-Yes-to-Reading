<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trucks! - National Geographic Kids</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Comic+Neue:wght@700&display=swap');

        :root {
            --primary: #f59e0b; /* Construction Yellow */
            --primary-light: #fef3c7;
            --primary-dark: #b45309;
            --secondary: #ef4444; /* Fire Truck Red */
            --bg-color: #f8fafc;
            --text-main: #1e293b; /* Asphalt Gray */
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        header {
            background: var(--text-main); color: var(--primary); padding: 15px; text-align: center;
            border-bottom: 6px dashed var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 10;
        }
        header h1 { font-family: 'Comic Neue', cursive; font-size: 2rem; text-transform: uppercase; letter-spacing: 2px; }

        main { flex: 1; overflow-y: auto; padding: 15px 15px 130px 15px; display: flex; flex-direction: column; align-items: center; }
        
        .section { display: none; width: 100%; max-width: 500px; animation: slideIn 0.4s ease-out forwards; }
        .section.active { display: flex; flex-direction: column; align-items: center; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .btn {
            background: var(--primary); color: var(--text-main); border: none; padding: 12px 20px;
            border-radius: 15px; font-weight: 900; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 5px 0 var(--primary-dark); transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:active { transform: translateY(5px); box-shadow: none; }
        .btn-outline { background: white; color: var(--text-main); border: 3px solid #cbd5e1; box-shadow: 0 5px 0 #94a3b8; }

        /* --- FLASHCARD --- */
        .flashcard {
            background: var(--card-bg); border-radius: 20px; padding: 25px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 5px solid var(--text-main);
            position: relative; min-height: 560px; display: flex; flex-direction: column; align-items: center;
        }
        
        .fact-badge {
            background: var(--primary-light); color: var(--primary-dark); padding: 10px 15px; border-radius: 12px;
            font-weight: 800; font-size: 0.95rem; border: 2px dashed var(--primary); margin-bottom: 10px; line-height: 1.4;
        }

        .truck-icon { font-size: 6.5rem; margin: 5px 0 10px 0; cursor: pointer; transition: transform 0.2s; }
        
        .name-badge-btn { 
            font-size: 1.1rem; color: var(--text-main); background: var(--primary); padding: 12px 25px; 
            border-radius: 25px; font-weight: 900; margin-bottom: 15px; 
            box-shadow: 0 4px 0 var(--primary-dark); cursor: pointer; border: none;
            display: inline-flex; align-items: center; gap: 10px;
        }

        .en-text { font-size: 1.35rem; font-weight: 900; color: var(--text-main); line-height: 1.5; margin-bottom: 10px; text-align: left; width: 100%; }
        .vi-text { font-size: 1.2rem; font-weight: 700; color: #475569; margin-bottom: 20px; display: none; line-height: 1.4; border-top: 1px dashed #cbd5e1; padding-top: 10px; text-align: left; width: 100%; }
        .vi-text.show { display: block; }

        /* --- VOCAB & GAME GRID --- */
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 15px; width: 100%; }
        .flip-card { background-color: transparent; height: 210px; perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.5s; transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-front, .flip-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px;
            box-shadow: 0 6px 0 #cbd5e1; border: 3px solid var(--text-main); background: white;
        }
        .flip-back { background: var(--text-main); color: var(--primary); transform: rotateY(180deg); }

        /* --- BOTTOM NAV --- */
        nav {
            position: fixed; bottom: 0; width: 100%; background: var(--text-main); border-top: 4px solid var(--primary);
            display: flex; justify-content: space-around; padding: 10px 10px 35px 10px; z-index: 100;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 0.9rem; font-weight: 900; flex: 1; cursor: pointer; gap: 4px; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 1.5rem; padding: 5px 20px; border-radius: 12px; transition: 0.3s; }
        .nav-item.active .nav-icon { background: rgba(245, 158, 11, 0.2); transform: translateY(-3px); }

        #driving-truck { position: fixed; bottom: 100px; left: -150px; font-size: 6rem; z-index: 200; pointer-events: none; display: none; }
        .drive-anim { display: block !important; animation: driveAcross 3s linear forwards; }
        @keyframes driveAcross { 0% { left: -150px; transform: scaleX(1); } 48% { left: 110vw; transform: scaleX(1); } 50% { left: 110vw; transform: scaleX(-1); } 100% { left: -150px; transform: scaleX(-1); } }
    </style>
</head>
<body>

    <header>
        <h1>Trucks! 🚧</h1>
    </header>

    <div id="driving-truck">🚛💨</div>

    <main>
        <div id="tab-read" class="section active">
            <div style="text-align: center; margin-bottom: 10px; font-weight: 900; color: var(--text-main);" id="page-indicator">Truck 1 / 12</div>
            <div class="flashcard">
                <div id="fact-badge" class="fact-badge"></div>
                <div class="truck-icon" id="truck-icon" onclick="speakTruckName()">🚜</div>
                
                <button id="name-badge" class="name-badge-btn" onclick="speakTruckName()">
                    SNOWPLOW /ˈsnəʊ.plaʊ/ 🔊
                </button>

                <div class="en-text" id="en-text">English</div>
                <div class="vi-text" id="vi-text">Vietnamese</div>
                
                <div style="margin-top: auto; display: flex; gap: 10px; width: 100%;">
                    <button class="btn btn-outline" style="flex: 1; min-height: 55px;" onclick="toggleVi()">E/V 🌐</button>
                    <button class="btn" style="flex: 2; min-height: 55px;" onclick="readText()">🔊 Listen All</button>
                </div>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 20px; padding-bottom: 35px; width: 100%; gap: 15px;">
                <button class="btn btn-outline" style="flex: 1; min-height: 65px;" onclick="prevCard()">⬅️ Back</button>
                <button class="btn btn-outline" style="flex: 1; min-height: 65px;" onclick="nextCard()">Next ➡️</button>
            </div>
        </div>

        <div id="tab-vocab" class="section">
            <div class="vocab-grid" id="vocab-container"></div>
        </div>

        <div id="tab-game" class="section">
            <div class="question-box" style="background: var(--text-main); padding: 20px; border-radius: 15px; border: 4px solid var(--primary); text-align: center; font-size: 1.2rem; font-weight: 900; margin-bottom: 20px; color: white;" id="quiz-question">Which truck is this?</div>
            <div class="vocab-grid" id="quiz-options" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
            <button class="btn" style="width: 100%; margin-top: 25px; background: var(--text-main); color: var(--primary);" onclick="initGame()">Restart Game 🔄</button>
        </div>
    </main>

    <nav>
        <div class="nav-item active" onclick="switchTab('read', this)">
            <div class="nav-icon">📖</div><span>Read</span>
        </div>
        <div class="nav-item" onclick="switchTab('vocab', this)">
            <div class="nav-icon">🚧</div><span>Vocab</span>
        </div>
        <div class="nav-item" onclick="switchTab('game', this)">
            <div class="nav-icon">🎮</div><span>Game</span>
        </div>
    </nav>

    <script>
        const truckData = [
            { id: "snowplow", w: "SNOWPLOW", ipa: "/ˈsnəʊ.plaʊ/", vi: "Xe dọn tuyết", icon: "🚜", en: "The snowplow shovels snow off the road. There's no business like snow business!", vi_sen: "Xe dọn tuyết xúc tuyết ra khỏi đường. Không có việc nào giống việc dọn tuyết đâu!", fact: "The blade on the front of the truck pushes the snow." },
            { id: "dumptruck", w: "DUMP TRUCK", ipa: "/dʌmp trʌk/", vi: "Xe ben", icon: "🛻", en: "Rocks and dirt tumble out of the dump truck.", vi_sen: "Đá và đất rơi ra khỏi xe ben.", fact: "This truck lifts its bed to dump a heavy load." },
            { id: "tanker", w: "TANKER TRUCK", ipa: "/ˈtæŋ.kə trʌk/", vi: "Xe bồn", icon: "🚛", en: "The tanker truck drives down a winding road.", vi_sen: "Xe bồn lái trên con đường quanh co.", fact: "The tank holds food, fuel, or water." },
            { id: "pickup", w: "PICKUP TRUCK", ipa: "/ˈpɪk.ʌp trʌk/", vi: "Xe bán tải", icon: "🚙", en: "The pickup truck delivers fresh food from the farm. Got any fresh eggs?", vi_sen: "Xe bán tải giao thức ăn tươi từ nông trại. Có quả trứng tươi nào không?", fact: "Pickups are used to haul tools and furniture." },
            { id: "concrete", w: "CONCRETE TRUCK", ipa: "/ˈkɒŋ.kriːt trʌk/", vi: "Xe trộn bê tông", icon: "🔄", en: "Spin. Mix. Pour. The concrete truck helps build a sidewalk.", vi_sen: "Xoay. Trộn. Đổ. Xe trộn bê tông giúp xây vỉa hè.", fact: "Wet concrete pours out of the chute." },
            { id: "firetruck", w: "FIRE TRUCK", ipa: "/ˈfaɪə trʌk/", vi: "Xe cứu hỏa", icon: "🚒", en: "Wee-ooo! The fire truck races to help people.", vi_sen: "Wee-ooo! Xe cứu hỏa lao đi để giúp đỡ mọi người.", fact: "The fire truck uses hoses to squirt water." },
            { id: "garbage", w: "GARBAGE TRUCK", ipa: "/ˈɡɑː.bɪdʒ trʌk/", vi: "Xe chở rác", icon: "🗑️", en: "The garbage truck rumbles and clanks. Don't forget to recycle, too!", vi_sen: "Xe chở rác kêu ầm ầm và loảng xoảng. Đừng quên tái chế nữa nhé!", fact: "A metal arm on the truck dumps the trash inside." },
            { id: "tractor", w: "TRACTOR TRAILER", ipa: "/ˈtræk.tə ˈtreɪ.lə/", vi: "Xe đầu kéo", icon: "🚚", en: "The tractor trailer zooms down the highway.", vi_sen: "Xe đầu kéo phóng nhanh trên đường cao tốc.", fact: "It's also called an 18-wheeler or a semi-trailer." },
            { id: "towtruck", w: "TOW TRUCK", ipa: "/təʊ trʌk/", vi: "Xe kéo", icon: "🪝", en: "The tow truck gives a ride to a broken car.", vi_sen: "Xe kéo chở một chiếc ô tô bị hỏng.", fact: "A cable pulls the car onto the truck." },
            { id: "icecream", w: "ICE-CREAM TRUCK", ipa: "/ˈaɪs.kriːm trʌk/", vi: "Xe kem", icon: "🍦", en: "The ice-cream truck plays a happy tune. Say \"yum\"!", vi_sen: "Xe kem phát ra một giai điệu vui vẻ. Hãy nói \"yum\" nào!", fact: "A freezer inside keeps the ice cream cold." },
            { id: "monster", w: "MONSTER TRUCK", ipa: "/ˈmɒn.stə trʌk/", vi: "Xe tải quái vật", icon: "🏴‍☠️", en: "The monster truck bounces on giant tires. I wheelie like this!", vi_sen: "Xe tải quái vật nảy trên những chiếc lốp khổng lồ. Tớ bốc đầu thế này này!", fact: "Monster trucks can jump over other cars!" }
        ];

        function speak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US'; u.rate = 0.85;
            window.speechSynthesis.speak(u);
        }

        let currCard = 0;
        let showVi = false;

        function renderCard() {
            const data = truckData[currCard];
            document.getElementById('page-indicator').innerText = `Truck ${currCard + 1} / ${truckData.length}`;
            document.getElementById('truck-icon').innerText = data.icon;
            document.getElementById('name-badge').innerHTML = `${data.w} ${data.ipa} 🔊`;
            document.getElementById('en-text').innerText = data.en;
            document.getElementById('vi-text').innerText = data.vi_sen;
            
            const badge = document.getElementById('fact-badge');
            badge.style.display = data.fact ? 'block' : 'none';
            badge.innerText = `💡 ${data.fact}`;
            updateViVisibility();
        }

        function toggleVi() { showVi = !showVi; updateViVisibility(); }
        function updateViVisibility() {
            const viEl = document.getElementById('vi-text');
            viEl.classList.toggle('show', showVi);
        }

        function nextCard() { currCard = (currCard + 1) % truckData.length; showVi = false; renderCard(); }
        function prevCard() { currCard = (currCard - 1 + truckData.length) % truckData.length; showVi = false; renderCard(); }
        
        function readText() { speak(truckData[currCard].en); }
        function speakTruckName() { speak(truckData[currCard].w); }

        function switchTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(id === 'game') initGame();
        }

        const vocabContainer = document.getElementById('vocab-container');
        truckData.forEach(item => {
            const div = document.createElement('div');
            div.className = 'flip-card';
            div.innerHTML = `
                <div class="flip-card-inner">
                    <div class="flip-front">
                        <div style="font-size: 3.5rem; margin-bottom: 5px;">${item.icon}</div>
                        <h3 style="font-weight: 900; font-size: 1.1rem;">${item.w}</h3>
                        <div style="color: #64748b; font-size: 0.85rem;">${item.ipa}</div>
                        <button style="position: absolute; top: 10px; right: 10px; border: none; background: none; font-size: 1.3rem;" onclick="event.stopPropagation(); speak('${item.w}')">🔊</button>
                    </div>
                    <div class="flip-back">
                        <h3 style="font-size: 1.3rem;">${item.vi}</h3>
                    </div>
                </div>`;
            div.onclick = () => div.classList.toggle('flipped');
            vocabContainer.appendChild(div);
        });

        let currQuiz = 0;
        let shuffledQuiz = [];
        const quizQuestions = [
            { q: "Which truck uses hoses to squirt water? 💦", ans: "firetruck" },
            { q: "Which truck holds food, fuel, or water in a tank? 🚛", ans: "tanker" },
            { q: "Which truck plays a happy tune? 🍦", ans: "icecream" },
            { q: "Which truck has a metal arm to dump trash? 🗑️", ans: "garbage" },
            { q: "Which truck is also called an 18-wheeler? 🛣️", ans: "tractor" },
            { q: "Which truck lifts its bed to dump rocks and dirt? 🪨", ans: "dumptruck" }
        ];

        function initGame() {
            shuffledQuiz = [...quizQuestions].sort(() => Math.random() - 0.5);
            currQuiz = 0;
            loadQuiz();
        }

        function loadQuiz() {
            const quizOptions = document.getElementById('quiz-options');
            if(currQuiz >= shuffledQuiz.length) {
                document.getElementById('quiz-question').innerText = "🏆 Truck Master! 🏆";
                quizOptions.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--primary-dark); font-size: 1.5rem; font-weight: 900;">You know all the trucks!</div>';
                triggerTruckDrive();
                return;
            }
            const q = shuffledQuiz[currQuiz];
            document.getElementById('quiz-question').innerText = q.q;
            speak(q.q);
            quizOptions.innerHTML = '';
            
            truckData.slice(0, 8).forEach(truck => {
                const btn = document.createElement('div');
                btn.style = "background: white; border: 3px solid var(--text-main); border-radius: 15px; padding: 15px; text-align: center; box-shadow: 0 4px 0 #cbd5e1; cursor: pointer; color: var(--text-main);";
                btn.innerHTML = `<div style="font-size:2.5rem;">${truck.icon}</div><span style="font-weight:800; font-size:0.9rem;">${truck.w}</span>`;
                btn.onclick = () => {
                    if(truck.id === q.ans) {
                        btn.style.background = "#dcfce7"; btn.style.borderColor = "#22c55e";
                        speak("Correct!");
                        setTimeout(() => { currQuiz++; loadQuiz(); }, 1200);
                    } else {
                        btn.style.background = "#fee2e2"; btn.style.borderColor = "#ef4444";
                        speak("Try again!");
                        setTimeout(() => { btn.style.background = "white"; btn.style.borderColor = "var(--text-main)"; }, 500);
                    }
                };
                quizOptions.appendChild(btn);
            });
        }

        function triggerTruckDrive() {
            const truck = document.getElementById('driving-truck');
            truck.classList.remove('drive-anim');
            void truck.offsetWidth; 
            truck.classList.add('drive-anim');
        }

        renderCard();
    </script>
</body>
</html>
