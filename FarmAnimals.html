<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Farm Animals - National Geographic Kids</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Comic+Neue:wght@700&display=swap');

        :root {
            --primary: #dc2626; /* Barn Red */
            --primary-light: #fecaca;
            --primary-dark: #991b1b;
            --secondary: #16a34a; /* Grass Green */
            --accent: #facc15; /* Hay Yellow */
            --bg-color: #f0fdf4; 
            --text-main: #451a03;
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { 
            background: linear-gradient(180deg, #dcfce7 0%, #bbf7d0 100%);
            color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        header {
            background: var(--primary); color: white; padding: 15px; text-align: center;
            border-bottom: 6px solid var(--primary-dark); box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 10;
        }
        header h1 { font-family: 'Comic Neue', cursive; font-size: 1.8rem; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); text-shadow: 2px 2px 0px var(--primary-dark);}

        main { flex: 1; overflow-y: auto; padding: 15px 15px 130px 15px; display: flex; flex-direction: column; align-items: center; }
        
        .section { display: none; width: 100%; max-width: 500px; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .section.active { display: flex; flex-direction: column; align-items: center; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .btn {
            background: var(--secondary); color: white; border: none; padding: 12px 20px;
            border-radius: 15px; font-weight: 900; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 5px 0 #15803d; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:active { transform: translateY(5px); box-shadow: none; }
        .btn-outline { background: white; color: var(--secondary); border: 3px solid var(--secondary); box-shadow: 0 5px 0 var(--secondary); }

        /* --- FLASHCARD --- */
        .flashcard {
            background: var(--card-bg); border-radius: 20px; padding: 25px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); border: 6px solid var(--accent);
            position: relative; min-height: 560px; display: flex; flex-direction: column; align-items: center;
        }
        
        .fact-badge {
            background: #fef08a; color: #854d0e; padding: 10px 15px; border-radius: 15px;
            font-weight: 800; font-size: 0.95rem; border: 2px dashed #ca8a04; margin-bottom: 10px; font-style: italic; line-height: 1.3;
        }

        .animal-icon { font-size: 6.5rem; margin: 5px 0; cursor: pointer; transition: transform 0.2s; text-shadow: 0px 10px 10px rgba(0,0,0,0.1); }
        
        .name-badge-btn { 
            font-size: 1.1rem; color: white; background: var(--primary); padding: 12px 25px; 
            border-radius: 25px; font-weight: 900; margin-bottom: 15px; 
            box-shadow: 0 4px 0 var(--primary-dark); cursor: pointer; border: none;
            display: inline-flex; align-items: center; gap: 10px;
        }

        .en-text { font-size: 1.35rem; font-weight: 900; color: var(--primary-dark); line-height: 1.5; margin-bottom: 10px; text-align: left; width: 100%; }
        .vi-text { font-size: 1.2rem; font-weight: 700; color: var(--secondary); margin-bottom: 20px; display: none; line-height: 1.4; border-top: 1px dashed #cbd5e1; padding-top: 10px; text-align: left; width: 100%; }
        .vi-text.show { display: block; }

        /* --- VOCAB & GAME GRID --- */
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 15px; width: 100%; }
        .flip-card { background-color: transparent; height: 220px; perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-front, .flip-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1); border: 3px solid var(--primary-light); background: white;
        }
        .flip-back { background: var(--primary-light); color: var(--primary-dark); transform: rotateY(180deg); border-color: var(--primary); }

        /* --- BOTTOM NAV --- */
        nav {
            position: fixed; bottom: 0; width: 100%; background: white; border-top: 4px solid var(--primary);
            display: flex; justify-content: space-around; padding: 10px 10px 35px 10px; z-index: 100;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #a8a29e; font-size: 0.9rem; font-weight: 900; flex: 1; cursor: pointer; gap: 4px; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 1.5rem; padding: 5px 20px; border-radius: 12px; transition: 0.3s; }
        .nav-item.active .nav-icon { background: var(--primary-light); transform: translateY(-3px); }

        #confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 200; overflow: hidden; display: none; }
        .confetti { position: absolute; font-size: 2rem; animation: fall linear forwards; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <header>
        <h1>Farm Animals 🚜</h1>
    </header>

    <div id="confetti-container"></div>

    <main>
        <div id="tab-read" class="section active">
            <div style="text-align: center; margin-bottom: 10px; font-weight: 900; color: var(--secondary);" id="page-indicator">Animal 1 / 5</div>
            <div class="flashcard">
                <div id="fact-badge" class="fact-badge"></div>
                <div class="animal-icon" id="animal-icon" onclick="speakAnimalName()">🐄</div>
                
                <button id="name-badge" class="name-badge-btn" onclick="speakAnimalName()">
                    COW /kaʊ/ 🔊
                </button>

                <div class="en-text" id="en-text">English</div>
                <div class="vi-text" id="vi-text">Vietnamese</div>
                
                <div style="margin-top: auto; display: flex; gap: 10px; width: 100%;">
                    <button class="btn btn-outline" style="flex: 1; min-height: 55px;" onclick="toggleVi()">E/V 🌐</button>
                    <button class="btn" style="flex: 2; min-height: 55px;" onclick="readText()">🔊 Listen All</button>
                </div>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 20px; padding-bottom: 35px; width: 100%; gap: 15px;">
                <button class="btn btn-outline" style="flex: 1; min-height: 65px; border-color: var(--primary-dark); color: var(--primary-dark);" onclick="prevCard()">⬅️ Back</button>
                <button class="btn btn-outline" style="flex: 1; min-height: 65px; border-color: var(--primary-dark); color: var(--primary-dark);" onclick="nextCard()">Next ➡️</button>
            </div>
        </div>

        <div id="tab-vocab" class="section">
            <div class="vocab-grid" id="vocab-container"></div>
        </div>

        <div id="tab-game" class="section">
            <div class="question-box" style="background: var(--card-bg); padding: 20px; border-radius: 15px; border: 4px solid var(--primary); text-align: center; font-size: 1.25rem; font-weight: 900; margin-bottom: 20px; color: var(--primary-dark);" id="quiz-question">Which animal is this?</div>
            <div class="vocab-grid" id="quiz-options" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
            <button class="btn" style="width: 100%; margin-top: 25px; background: var(--primary); color: white;" onclick="initGame()">Restart Game 🔄</button>
        </div>
    </main>

    <nav>
        <div class="nav-item active" onclick="switchTab('read', this)">
            <div class="nav-icon">📖</div><span>Read</span>
        </div>
        <div class="nav-item" onclick="switchTab('vocab', this)">
            <div class="nav-icon">🚜</div><span>Vocab</span>
        </div>
        <div class="nav-item" onclick="switchTab('game', this)">
            <div class="nav-icon">🎮</div><span>Game</span>
        </div>
    </nav>

    <script>
        const farmData = [
            { 
                id: "cow", w: "COW", ipa: "/kaʊ/", vi: "Con bò", icon: "🐄", 
                en: "Cows eat grass. A group of cows is called a herd. People drink milk that comes from cows.", 
                vi_sen: "Bò ăn cỏ. Một đàn bò được gọi là một bầy. Mọi người uống sữa vắt từ những con bò.", 
                fact: "One cow can give enough milk in a day to fill 400 glasses." 
            },
            { 
                id: "chicken", w: "CHICKEN", ipa: "/ˈtʃɪk.ɪn/", vi: "Con gà", icon: "🐔", 
                en: "A mommy chicken is called a hen. A daddy is a rooster. Babies are chicks. Hens lay eggs. Chicks hatch from eggs.", 
                vi_sen: "Gà mẹ được gọi là gà mái. Gà bố là gà trống. Gà con là những chú gà chíp. Gà mái đẻ trứng. Gà con nở ra từ trứng.", 
                fact: "Chickens are birds. They have feathers." 
            },
            { 
                id: "sheep", w: "SHEEP", ipa: "/ʃiːp/", vi: "Con cừu", icon: "🐑", 
                en: "Sheep grow lots of hair called wool. People shave sheep when their wool is long. People use sheep wool to make sweaters.", 
                vi_sen: "Cừu mọc rất nhiều lông gọi là len. Mọi người cạo lông cừu khi lông của chúng dài. Mọi người dùng len cừu để làm áo len.", 
                fact: "Shaving sheep is called shearing." 
            },
            { 
                id: "horse", w: "HORSE", ipa: "/hɔːs/", vi: "Con ngựa", icon: "🐎", 
                en: "Horses can run fast. Horses give people rides.", 
                vi_sen: "Ngựa có thể chạy nhanh. Ngựa có thể chở người đi dạo.", 
                fact: "Horses can sleep standing up!" 
            },
            { 
                id: "pig", w: "PIG", ipa: "/pɪɡ/", vi: "Con lợn", icon: "🐖", 
                en: "Pigs come in many colors. A mother pig can have many babies at once. Baby pigs are called piglets.", 
                vi_sen: "Lợn có nhiều màu sắc khác nhau. Lợn mẹ có thể sinh nhiều con cùng một lúc. Lợn con được gọi là lợn sữa.", 
                fact: "A pig's nose is called a snout. The pig uses its snout to find food." 
            }
        ];

        const quizQuestions = [
            { q: "Which farm animal gives us milk? 🥛", ans: "cow" },
            { q: "Which one hatches from an egg? 🥚", ans: "chicken" },
            { q: "Which farm animal gives us wool? 🧶", ans: "sheep" },
            { q: "Which one can you ride? 🏇", ans: "horse" },
            { q: "Which farm animal has babies called piglets? 🐷", ans: "pig" }
        ];

        function speak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US'; u.rate = 0.85;
            window.speechSynthesis.speak(u);
        }

        let currCard = 0;
        let showVi = false;

        function renderCard() {
            const data = farmData[currCard];
            document.getElementById('page-indicator').innerText = `Animal ${currCard + 1} / ${farmData.length}`;
            document.getElementById('animal-icon').innerText = data.icon;
            document.getElementById('name-badge').innerHTML = `${data.w} ${data.ipa} 🔊`;
            document.getElementById('en-text').innerText = data.en;
            document.getElementById('vi-text').innerText = data.vi_sen;
            
            const badge = document.getElementById('fact-badge');
            badge.style.display = data.fact ? 'block' : 'none';
            badge.innerText = `💡 ${data.fact}`;
            updateViVisibility();
        }

        function toggleVi() { showVi = !showVi; updateViVisibility(); }
        function updateViVisibility() {
            const viEl = document.getElementById('vi-text');
            viEl.classList.toggle('show', showVi);
        }

        function nextCard() { currCard = (currCard + 1) % farmData.length; showVi = false; renderCard(); }
        function prevCard() { currCard = (currCard - 1 + farmData.length) % farmData.length; showVi = false; renderCard(); }
        
        function readText() { speak(farmData[currCard].en + " " + farmData[currCard].fact); }
        function speakAnimalName() { speak(farmData[currCard].w); }

        function switchTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(id === 'game') initGame();
        }

        const vocabContainer = document.getElementById('vocab-container');
        farmData.forEach(item => {
            const div = document.createElement('div');
            div.className = 'flip-card';
            div.innerHTML = `
                <div class="flip-card-inner">
                    <div class="flip-front">
                        <div style="font-size: 3.5rem; margin-bottom: 5px;">${item.icon}</div>
                        <h3 style="font-weight: 900; font-size: 1.1rem;">${item.w}</h3>
                        <div style="color: #64748b; font-size: 0.85rem;">${item.ipa}</div>
                        <button style="position: absolute; top: 10px; right: 10px; border: none; background: none; font-size: 1.3rem;" onclick="event.stopPropagation(); speak('${item.w}')">🔊</button>
                    </div>
                    <div class="flip-back">
                        <h3 style="font-size: 1.3rem;">${item.vi}</h3>
                    </div>
                </div>`;
            div.onclick = () => div.classList.toggle('flipped');
            vocabContainer.appendChild(div);
        });

        let currQuiz = 0;
        let shuffledQuiz = [];

        function initGame() {
            shuffledQuiz = [...quizQuestions].sort(() => Math.random() - 0.5);
            currQuiz = 0;
            loadQuiz();
        }

        function loadQuiz() {
            const quizOptions = document.getElementById('quiz-options');
            if(currQuiz >= shuffledQuiz.length) {
                document.getElementById('quiz-question').innerText = "🏆 Farm Expert! 🏆";
                quizOptions.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--primary-dark); font-size: 1.5rem; font-weight: 900;">You finished the game!</div>';
                triggerConfetti();
                return;
            }
            const q = shuffledQuiz[currQuiz];
            document.getElementById('quiz-question').innerText = q.q;
            speak(q.q);
            quizOptions.innerHTML = '';
            
            farmData.forEach(animal => {
                const btn = document.createElement('div');
                btn.style = "background: white; border: 3px solid var(--accent); border-radius: 15px; padding: 15px; text-align: center; box-shadow: 0 4px 0 #ca8a04; cursor: pointer; color: var(--text-main);";
                btn.innerHTML = `<div style="font-size:2.5rem;">${animal.icon}</div><span style="font-weight:800; font-size:1rem;">${animal.w}</span>`;
                btn.onclick = () => {
                    if(animal.id === q.ans) {
                        btn.style.background = "#dcfce7"; btn.style.borderColor = "#22c55e";
                        speak("Correct!");
                        setTimeout(() => { currQuiz++; loadQuiz(); }, 1200);
                    } else {
                        btn.style.background = "#fee2e2"; btn.style.borderColor = "#ef4444";
                        speak("Try again!");
                        setTimeout(() => { btn.style.background = "white"; btn.style.borderColor = "var(--accent)"; }, 500);
                    }
                };
                quizOptions.appendChild(btn);
            });
        }

        function triggerConfetti() {
            const container = document.getElementById('confetti-container');
            container.innerHTML = ''; container.style.display = 'block';
            const icons = ['🐄', '🐔', '🐑', '🐎', '🐖', '⭐'];
            for(let i=0; i<30; i++) {
                const el = document.createElement('div');
                el.className = 'confetti'; el.innerText = icons[Math.floor(Math.random() * icons.length)];
                el.style.left = `${Math.random() * 100}vw`; el.style.animationDuration = `${Math.random() * 2 + 2}s`;
                container.appendChild(el);
            }
        }
        renderCard();
    </script>
</body>
</html>
