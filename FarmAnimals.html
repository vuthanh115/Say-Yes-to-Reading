<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm Animals - National Geographic Kids</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Comic+Neue:wght@700&display=swap');

        :root {
            --primary: #dc2626; /* Barn Red */
            --primary-light: #fecaca;
            --primary-dark: #991b1b;
            --secondary: #16a34a; /* Grass Green */
            --accent: #facc15; /* Hay Yellow */
            --bg-color: #f0fdf4; /* Light Green Bg */
            --text-main: #451a03; /* Brown dirt */
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        body { 
            background: linear-gradient(180deg, #dcfce7 0%, #bbf7d0 100%);
            color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }
        
        header {
            background: var(--primary); color: white; padding: 15px; text-align: center;
            border-bottom: 6px solid var(--primary-dark); box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 10;
        }
        header h1 { font-family: 'Comic Neue', cursive; font-size: 1.8rem; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); text-shadow: 2px 2px 0px var(--primary-dark);}
        header p { font-size: 0.95rem; font-weight: 800; color: #fecaca; }

        main { flex: 1; overflow-y: auto; padding: 20px 15px 100px 15px; display: flex; flex-direction: column; align-items: center; }
        
        .section { display: none; width: 100%; max-width: 500px; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .section.active { display: block; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        /* --- BUTTONS --- */
        .btn {
            background: var(--secondary); color: white; border: none; padding: 12px 20px;
            border-radius: 15px; font-weight: 900; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 5px 0 #15803d; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:active { transform: translateY(5px); box-shadow: none; }
        .btn-outline { background: white; color: var(--secondary); border: 3px solid var(--secondary); box-shadow: 0 5px 0 var(--secondary); }

        /* --- FLASHCARD (READ TAB) --- */
        .flashcard {
            background: var(--card-bg); border-radius: 20px; padding: 25px 20px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); border: 6px solid var(--accent);
            position: relative; min-height: 520px; display: flex; flex-direction: column; align-items: center;
        }
        
        .fact-badge {
            background: #fef08a; color: #854d0e; padding: 10px 15px; border-radius: 15px;
            font-weight: 800; font-size: 0.95rem; border: 2px dashed #ca8a04; margin-bottom: 15px; font-style: italic; line-height: 1.3;
        }

        .animal-icon { font-size: 6.5rem; margin: 5px 0; cursor: pointer; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-shadow: 0px 10px 10px rgba(0,0,0,0.1); }
        .animal-icon:active { transform: scale(0.8) translateY(10px); }
        
        .en-text { font-size: 1.2rem; font-weight: 900; color: var(--primary-dark); line-height: 1.4; margin-bottom: 10px; }
        .vi-text { font-size: 1.05rem; font-weight: 700; color: var(--secondary); margin-bottom: 20px; display: none; line-height: 1.4; border-top: 1px dashed #cbd5e1; padding-top: 10px; }
        .vi-text.show { display: block; animation: fadeIn 0.3s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- VOCAB GRID --- */
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .flip-card { background-color: transparent; height: 180px; perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-front, .flip-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1); border: 3px solid var(--primary-light); background: white;
        }
        .flip-back { background: var(--primary-light); color: var(--primary-dark); transform: rotateY(180deg); border-color: var(--primary); box-shadow: 0 6px 0 var(--primary-dark);}

        /* --- GAME TAB --- */
        .question-box { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 4px solid var(--primary); text-align: center; font-size: 1.25rem; font-weight: 900; margin-bottom: 20px; color: var(--primary-dark); box-shadow: 0 4px 0 var(--primary-light); }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option-btn {
            background: white; border: 3px solid #cbd5e1; border-radius: 15px; padding: 15px; font-size: 3rem;
            cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 5px; box-shadow: 0 5px 0 #94a3b8;
        }
        .option-btn span { font-size: 1.1rem; font-weight: 900; color: var(--text-main); }
        .option-btn:active { transform: translateY(5px); box-shadow: none; }
        .option-btn.correct { background: #dcfce7; border-color: #22c55e; box-shadow: 0 5px 0 #16a34a; }
        .option-btn.wrong { background: #fee2e2; border-color: #ef4444; box-shadow: 0 5px 0 #b91c1c; animation: shake 0.3s;}

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        /* --- BOTTOM NAV --- */
        nav {
            position: fixed; bottom: 0; width: 100%; background: white; border-top: 4px solid var(--primary);
            display: flex; justify-content: space-around; padding: 10px 10px 25px 10px; z-index: 100; box-shadow: 0 -4px 15px rgba(0,0,0,0.05);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #a8a29e; font-size: 0.9rem; font-weight: 900; gap: 4px; cursor: pointer; transition: 0.3s; flex: 1; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 1.5rem; padding: 5px 20px; border-radius: 12px; transition: 0.3s; }
        .nav-item.active .nav-icon { background: var(--primary-light); transform: translateY(-3px); }

        /* CONFETTI EFFECT */
        #confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 200; overflow: hidden; display: none; }
        .confetti { position: absolute; font-size: 2rem; animation: fall linear forwards; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <header>
        <h1>Farm Animals 🚜</h1>
        <p>National Geographic Kids</p>
    </header>

    <div id="confetti-container"></div>

    <main>
        <div id="tab-read" class="section active">
            <div style="text-align: center; margin-bottom: 10px; font-weight: 900; color: var(--secondary);" id="page-indicator">Animal 1 / 5</div>
            <div class="flashcard">
                <div id="fact-badge" class="fact-badge"></div>
                <div class="animal-icon" id="animal-icon" onclick="makeSound()">🐄</div>
                <div class="en-text" id="en-text">English</div>
                <div class="vi-text" id="vi-text">Vietnamese</div>
                
                <div style="margin-top: auto; display: flex; gap: 10px; width: 100%;">
                    <button class="btn btn-outline" style="flex: 1;" onclick="toggleVi()">E/V 🌐</button>
                    <button class="btn" style="flex: 2;" onclick="readText()">🔊 Listen</button>
                </div>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 20px;">
                <button class="btn btn-outline" style="background: white; color: var(--primary-dark); border-color: var(--primary-dark); box-shadow: 0 5px 0 var(--primary-dark);" onclick="prevCard()">⬅️ Back</button>
                <button class="btn btn-outline" style="background: white; color: var(--primary-dark); border-color: var(--primary-dark); box-shadow: 0 5px 0 var(--primary-dark);" onclick="nextCard()">Next ➡️</button>
            </div>
        </div>

        <div id="tab-vocab" class="section">
            <div class="vocab-grid" id="vocab-container"></div>
        </div>

        <div id="tab-game" class="section">
            <div class="question-box" id="quiz-question">Which farm animal gives us milk?</div>
            <div class="options-grid" id="quiz-options"></div>
            <button class="btn" style="width: 100%; margin-top: 25px; background: var(--primary); color: white;" onclick="initGame()">Restart Game 🔄</button>
        </div>
    </main>

    <nav>
        <div class="nav-item active" onclick="switchTab('read', this)">
            <div class="nav-icon">📖</div><span>Read</span>
        </div>
        <div class="nav-item" onclick="switchTab('vocab', this)">
            <div class="nav-icon">🚜</div><span>Vocab</span>
        </div>
        <div class="nav-item" onclick="switchTab('game', this)">
            <div class="nav-icon">🎮</div><span>Game</span>
        </div>
    </nav>

    <script>
        // --- FULL RESTORED DATA ---
        const farmData = [
            { 
                id: "cow", w: "Cow", vi: "Con bò", icon: "🐄", sound: "Moo!", 
                en: "Cows eat grass. A group of cows is called a herd. People drink milk that comes from cows.", 
                vi_sen: "Bò ăn cỏ. Một đàn bò được gọi là một bầy. Mọi người uống sữa vắt từ những con bò.", 
                fact: "One cow can give enough milk in a day to fill 400 glasses." 
            },
            { 
                id: "chicken", w: "Chicken", vi: "Con gà", icon: "🐔", sound: "Cluck, cluck!", 
                en: "A mommy chicken is called a hen. A daddy is a rooster. Babies are chicks. Hens lay eggs. Chicks hatch from eggs.", 
                vi_sen: "Gà mẹ được gọi là gà mái. Gà bố là gà trống. Gà con là những chú gà chíp. Gà mái đẻ trứng. Gà con nở ra từ trứng.", 
                fact: "Chickens are birds. They have feathers." 
            },
            { 
                id: "sheep", w: "Sheep", vi: "Con cừu", icon: "🐑", sound: "Baa!", 
                en: "Sheep grow lots of hair called wool. People shave sheep when their wool is long. People use sheep wool to make sweaters.", 
                vi_sen: "Cừu mọc rất nhiều lông gọi là len. Mọi người cạo lông cừu khi lông của chúng dài. Mọi người dùng len cừu để làm áo len.", 
                fact: "Shaving sheep is called shearing." 
            },
            { 
                id: "horse", w: "Horse", vi: "Con ngựa", icon: "🐎", sound: "Neigh!", 
                en: "Horses can run fast. Horses give people rides.", 
                vi_sen: "Ngựa có thể chạy nhanh. Ngựa có thể chở người đi dạo.", 
                fact: "Horses can sleep standing up!" 
            },
            { 
                id: "pig", w: "Pig", vi: "Con lợn", icon: "🐖", sound: "Oink, oink!", 
                en: "Pigs come in many colors. A mother pig can have many babies at once. Baby pigs are called piglets.", 
                vi_sen: "Lợn có nhiều màu sắc khác nhau. Lợn mẹ có thể sinh nhiều con cùng một lúc. Lợn con được gọi là lợn sữa.", 
                fact: "A pig's nose is called a snout. The pig uses its snout to find food." 
            }
        ];

        const quizQuestions = [
            { q: "Which farm animal gives us milk? 🥛", ans: "cow" },
            { q: "Which one hatches from an egg? 🥚", ans: "chicken" },
            { q: "Which farm animal gives us wool? 🧶", ans: "sheep" },
            { q: "Which one can you ride? 🏇", ans: "horse" },
            { q: "Which farm animal has babies called piglets? 🐷", ans: "pig" }
        ];

        // --- SPEECH API ---
        function speak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US'; u.rate = 0.85;
            window.speechSynthesis.speak(u);
        }

        // --- TAB MANAGEMENT ---
        function switchTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(id === 'game') initGame();
        }

        // --- READ TAB LOGIC ---
        let currCard = 0;
        let showVi = false;

        function renderCard() {
            const data = farmData[currCard];
            document.getElementById('page-indicator').innerText = `Animal ${currCard + 1} / ${farmData.length}`;
            document.getElementById('animal-icon').innerText = data.icon;
            document.getElementById('en-text').innerText = data.en;
            document.getElementById('vi-text').innerText = data.vi_sen;
            
            const badge = document.getElementById('fact-badge');
            if(data.fact) {
                badge.style.display = 'block';
                badge.innerText = `💡 ${data.fact}`;
            } else {
                badge.style.display = 'none';
            }
            updateViVisibility();
        }

        function toggleVi() { showVi = !showVi; updateViVisibility(); }
        function updateViVisibility() {
            const viEl = document.getElementById('vi-text');
            if(showVi) viEl.classList.add('show'); else viEl.classList.remove('show');
        }

        function nextCard() { currCard = (currCard + 1) % farmData.length; showVi = false; renderCard(); }
        function prevCard() { currCard = (currCard - 1 + farmData.length) % farmData.length; showVi = false; renderCard(); }
        function readText() { 
            let txt = farmData[currCard].en + " " + farmData[currCard].fact;
            speak(txt); 
        }
        function makeSound() {
            const icon = document.getElementById('animal-icon');
            icon.style.transform = 'scale(0.8) translateY(10px)';
            setTimeout(() => icon.style.transform = 'scale(1) translateY(0)', 200);
            speak(farmData[currCard].sound + " " + farmData[currCard].w);
        }

        // --- VOCAB TAB LOGIC ---
        const vocabContainer = document.getElementById('vocab-container');
        farmData.forEach(item => {
            const div = document.createElement('div');
            div.className = 'flip-card';
            div.innerHTML = `
                <div class="flip-card-inner">
                    <div class="flip-front">
                        <div style="font-size: 3.5rem; margin-bottom: 5px;">${item.icon}</div>
                        <h3 style="color: var(--text-main); font-size: 1.2rem; font-weight: 900;">${item.w}</h3>
                        <button class="btn btn-outline" style="position: absolute; top: 8px; right: 8px; padding: 4px; border-radius: 8px; min-width: 32px; border-width: 2px;" onclick="event.stopPropagation(); speak('${item.w}')">🔊</button>
                    </div>
                    <div class="flip-back">
                        <h3 style="font-size: 1.4rem;">${item.vi}</h3>
                    </div>
                </div>`;
            div.onclick = () => div.classList.toggle('flipped');
            vocabContainer.appendChild(div);
        });

        // --- GAME TAB LOGIC ---
        let currQuiz = 0;
        let shuffledQuiz = [];

        function initGame() {
            shuffledQuiz = [...quizQuestions].sort(() => Math.random() - 0.5);
            currQuiz = 0;
            document.getElementById('confetti-container').style.display = 'none';
            loadQuiz();
        }

        function loadQuiz() {
            if(currQuiz >= shuffledQuiz.length) {
                document.getElementById('quiz-question').innerText = "🏆 You are a Farm Expert! 🏆";
                document.getElementById('quiz-options').innerHTML = '';
                triggerConfetti();
                speak("Great job! You know all the farm animals!");
                return;
            }

            const q = shuffledQuiz[currQuiz];
            document.getElementById('quiz-question').innerText = q.q;
            speak(q.q);

            const optionsGrid = document.getElementById('quiz-options');
            optionsGrid.innerHTML = '';
            
            // Generate 4 options including correct one
            let opts = farmData.map(v => v.id);
            opts = opts.sort(() => Math.random() - 0.5).slice(0, 4);
            if(!opts.includes(q.ans)) opts[0] = q.ans; 
            opts.sort(() => Math.random() - 0.5); 

            opts.forEach(optId => {
                const vData = farmData.find(v => v.id === optId);
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.innerHTML = `${vData.icon}<span>${vData.w}</span>`;
                btn.onclick = () => checkAnswer(btn, optId, q.ans);
                optionsGrid.appendChild(btn);
            });
        }

        function checkAnswer(btn, selected, correct) {
            if(selected === correct) {
                btn.classList.add('correct');
                speak("Correct!");
                setTimeout(() => { currQuiz++; loadQuiz(); }, 1200);
            } else {
                btn.classList.add('wrong');
                speak("Try again!");
                setTimeout(() => btn.classList.remove('wrong'), 500);
            }
        }

        function triggerConfetti() {
            const container = document.getElementById('confetti-container');
            container.innerHTML = '';
            container.style.display = 'block';
            const icons = ['🐄', '🐔', '🐑', '🐎', '🐖', '⭐'];
            for(let i=0; i<30; i++) {
                const el = document.createElement('div');
                el.className = 'confetti';
                el.innerText = icons[Math.floor(Math.random() * icons.length)];
                el.style.left = `${Math.random() * 100}vw`;
                el.style.animationDuration = `${Math.random() * 2 + 2}s`;
                el.style.animationDelay = `${Math.random() * 1}s`;
                container.appendChild(el);
            }
        }

        // Initialize App
        renderCard();
    </script>
</body>
</html>
