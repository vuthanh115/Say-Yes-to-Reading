<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean - National Geographic Kids</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Comic+Neue:wght@700&display=swap');

        :root {
            --primary: #0284c7; /* Ocean Blue */
            --primary-light: #e0f2fe;
            --primary-dark: #0f172a; /* Deep Sea */
            --secondary: #f43f5e; /* Coral Pink */
            --accent: #fde047; /* Sand Yellow */
            --bg-color: #bae6fd;
            --text-main: #0f172a;
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        body { 
            background: linear-gradient(180deg, #38bdf8 0%, #0369a1 100%);
            color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }
        
        header {
            background: rgba(2, 132, 199, 0.85); backdrop-filter: blur(10px);
            color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 10;
        }
        header h1 { font-family: 'Comic Neue', cursive; font-size: 1.8rem; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); }
        header p { font-size: 0.9rem; font-weight: 700; color: #e0f2fe; }

        main { flex: 1; overflow-y: auto; padding: 20px 15px; padding-bottom: 100px; display: flex; flex-direction: column; align-items: center; }
        
        .section { display: none; width: 100%; max-width: 500px; animation: slideUp 0.4s ease-out forwards; }
        .section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- BUTTONS --- */
        .btn {
            background: var(--accent); color: var(--primary-dark); border: none; padding: 12px 25px;
            border-radius: 25px; font-weight: 900; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 4px 0 #ca8a04; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-outline { background: white; color: var(--primary); border: 2px solid var(--primary); box-shadow: 0 4px 0 var(--primary-dark); }

        /* --- FLASHCARD (READ TAB) --- */
        .flashcard {
            background: var(--card-bg); border-radius: 30px; padding: 25px 20px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 6px solid var(--primary-light);
            position: relative; min-height: 500px; display: flex; flex-direction: column; align-items: center;
        }
        
        .fact-bubble {
            background: #fef08a; color: #854d0e; padding: 10px 15px; border-radius: 20px; font-weight: 800;
            font-size: 0.95rem; border: 2px dashed #eab308; margin-bottom: 10px; font-style: italic; line-height: 1.3;
        }

        .animal-icon { font-size: 6.5rem; margin: 5px 0 10px 0; cursor: pointer; transition: transform 0.3s; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.15)); }
        .animal-icon:active { transform: scale(0.9) translateY(5px); }
        
        .en-text { font-size: 1.2rem; font-weight: 900; color: var(--primary-dark); line-height: 1.4; margin-bottom: 10px; }
        .vi-text { font-size: 1.05rem; font-weight: 700; color: #0284c7; margin-bottom: 20px; display: none; line-height: 1.4; border-top: 1px dashed #cbd5e1; padding-top: 10px; }
        .vi-text.show { display: block; animation: fadeIn 0.3s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- VOCAB GRID --- */
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .flip-card { background-color: transparent; height: 180px; perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-front, .flip-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.15); border: 3px solid var(--primary-light); background: white;
        }
        .flip-back { background: var(--primary-light); color: var(--primary-dark); transform: rotateY(180deg); border-color: var(--primary); }
        
        /* --- GAME TAB --- */
        .question-box { background: white; padding: 20px; border-radius: 20px; border: 4px solid var(--secondary); text-align: center; font-size: 1.3rem; font-weight: 800; margin-bottom: 20px; color: var(--primary-dark); }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option-btn {
            background: white; border: 3px solid #cbd5e1; border-radius: 20px; padding: 15px; font-size: 3rem;
            cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 5px; box-shadow: 0 4px 0 #94a3b8;
        }
        .option-btn span { font-size: 1.1rem; font-weight: 900; color: var(--text-main); }
        .option-btn:active { transform: translateY(4px); box-shadow: none; }
        .option-btn.correct { background: #dcfce7; border-color: #22c55e; box-shadow: 0 4px 0 #16a34a; }
        .option-btn.wrong { background: #fee2e2; border-color: #ef4444; box-shadow: 0 4px 0 #b91c1c; animation: shake 0.3s; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        /* --- BOTTOM NAV --- */
        nav {
            position: fixed; bottom: 0; width: 100%; background: white; border-top: 3px solid var(--accent);
            display: flex; justify-content: space-around; padding: 10px 10px 25px 10px; box-shadow: 0 -4px 20px rgba(0,0,0,0.15); z-index: 100;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 0.9rem; font-weight: 900; gap: 4px; cursor: pointer; transition: 0.3s; flex: 1; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 1.5rem; padding: 8px 25px; border-radius: 15px; transition: 0.3s; }
        .nav-item.active .nav-icon { background: var(--primary-light); transform: translateY(-5px); color: var(--primary-dark); border: 2px solid var(--primary); }

        /* BUBBLES EFFECT */
        #bubble-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 200; overflow: hidden; display: none; }
        .bubble { position: absolute; bottom: -20px; background: rgba(255, 255, 255, 0.6); border-radius: 50%; border: 1px solid rgba(255,255,255,0.8); animation: floatUp linear forwards; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-120vh) scale(1.5); opacity: 0; } }
    </style>
</head>
<body>

    <header>
        <h1>Ocean Explorer 🌊</h1>
        <p>National Geographic Kids</p>
    </header>

    <div id="bubble-container"></div>

    <main>
        <div id="tab-read" class="section active">
            <div style="text-align: center; margin-bottom: 10px; font-weight: 900; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.3);" id="page-indicator">Animal 1 / 11</div>
            <div class="flashcard">
                <div id="fact-badge" class="fact-bubble"></div>
                <div class="animal-icon" id="animal-icon" onclick="boop()">🐠</div>
                <div class="en-text" id="en-text">English text here</div>
                <div class="vi-text" id="vi-text">Vietnamese text here</div>
                
                <div style="margin-top: auto; display: flex; gap: 10px; width: 100%;">
                    <button class="btn btn-outline" style="flex: 1;" onclick="toggleVi()">A/V 🌐</button>
                    <button class="btn" style="flex: 2;" onclick="readText()">🔊 Listen</button>
                </div>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 20px;">
                <button class="btn btn-outline" style="background: rgba(255,255,255,0.9); color: var(--primary-dark);" onclick="prevCard()">⬅️ Back</button>
                <button class="btn btn-outline" style="background: rgba(255,255,255,0.9); color: var(--primary-dark);" onclick="nextCard()">Next ➡️</button>
            </div>
        </div>

        <div id="tab-vocab" class="section">
            <div class="vocab-grid" id="vocab-container"></div>
        </div>

        <div id="tab-game" class="section">
            <div class="question-box" id="quiz-question">Which animal is this?</div>
            <div class="options-grid" id="quiz-options"></div>
            <button class="btn" style="width: 100%; margin-top: 25px;" onclick="initGame()">Restart Game 🔄</button>
        </div>
    </main>

    <nav>
        <div class="nav-item active" onclick="switchTab('read', this)">
            <div class="nav-icon">📖</div><span>Read</span>
        </div>
        <div class="nav-item" onclick="switchTab('vocab', this)">
            <div class="nav-icon">🔤</div><span>Vocab</span>
        </div>
        <div class="nav-item" onclick="switchTab('game', this)">
            <div class="nav-icon">🎮</div><span>Game</span>
        </div>
    </nav>

    <script>
        // --- FULL DATA RESTORED ---
        const oceanData = [
            { 
                id: "seahorse", w: "Seahorse", vi: "Cá ngựa", icon: "🐉", 
                en: "The ocean is made of water. Many animals live in the ocean. A seahorse holds on to coral with its tail.", 
                vi_sentence: "Đại dương được tạo nên từ nước. Có rất nhiều loài động vật sống ở đại dương. Một chú cá ngựa dùng đuôi bám chặt vào san hô.", 
                fact: "I'm a fish that looks like a horse!" 
            },
            { 
                id: "penguin", w: "Penguin", vi: "Chim cánh cụt", icon: "🐧", 
                en: "A penguin dives into the water. Whee!", 
                vi_sentence: "Một chú chim cánh cụt lặn xuống nước. Whee!", 
                fact: "Dive into the deep blue!" 
            },
            { 
                id: "seastar", w: "Sea Star", vi: "Sao biển", icon: "⭐", 
                en: "A sea star climbs over coral.", 
                vi_sentence: "Một con sao biển bò qua rặng san hô.", 
                fact: "Each point of a sea star is called a ray." 
            },
            { 
                id: "seaturtle", w: "Sea Turtle", vi: "Rùa biển", icon: "🐢", 
                en: "Fish follow a sea turtle through a coral reef. Wait for me!", 
                vi_sentence: "Đàn cá bơi theo rùa biển qua rặng san hô. Đợi tớ với!", 
                fact: "A coral reef is home to many ocean animals." 
            },
            { 
                id: "clownfish", w: "Clownfish", vi: "Cá hề", icon: "🐠", 
                en: "Clownfish hide in a sea anemone. Hey, that tickles!", 
                vi_sentence: "Cá hề trốn trong một bông hải quỳ. Này, nhột quá đi!", 
                fact: "Sea anemones are animals with many tentacles." 
            },
            { 
                id: "sealion", w: "Sea Lion", vi: "Sư tử biển", icon: "🦭", 
                en: "Sea lions flap their front flippers to swim. Sea lions twist and turn through seaweed forests.", 
                vi_sentence: "Sư tử biển đập hai chân chèo phía trước để bơi. Chúng xoay và lượn qua những khu rừng rong biển.", 
                fact: "A baby sea lion can swim as soon as it is born." 
            },
            { 
                id: "schoolfish", w: "School of Fish", vi: "Đàn cá", icon: "🐟", 
                en: "Colorful fish swirl in schools. Is it time for recess?", 
                vi_sentence: "Những chú cá đầy màu sắc bơi thành đàn. Đã đến giờ ra chơi chưa nhỉ?", 
                fact: "Swimming together helps the fish find food." 
            },
            { 
                id: "jellyfish", w: "Jellyfish", vi: "Sứa", icon: "🪼", 
                en: "Jellyfish drift through the water.", 
                vi_sentence: "Những chú sứa trôi lơ lửng trong nước.", 
                fact: "Jellyfish use their long tentacles to catch fish to eat." 
            },
            { 
                id: "octopus", w: "Octopus", vi: "Bạch tuộc", icon: "🐙", 
                en: "An octopus sneaks along the ocean floor.", 
                vi_sentence: "Một chú bạch tuộc lẻn dọc theo đáy đại dương.", 
                fact: "An octopus can change colors to match its home." 
            },
            { 
                id: "walrus", w: "Walrus", vi: "Hải mã", icon: "🦦", 
                en: "Walruses climb onto ice to rest. Get ready for naptime!", 
                vi_sentence: "Những chú hải mã trèo lên tảng băng để nghỉ ngơi. Sẵn sàng cho giờ đi ngủ thôi!", 
                fact: "Stay warm on the cold ice." 
            },
            { 
                id: "dolphin", w: "Dolphin", vi: "Cá heo", icon: "🐬", 
                en: "Dolphins race and play underwater. Where would you explore in the ocean? Can you find: 1 jellyfish, 2 dolphins, 3 sea stars, 4 clownfish?", 
                vi_sentence: "Cá heo đua nhau và vui đùa dưới nước. Bé sẽ khám phá nơi nào ở đại dương? Bé có tìm thấy: 1 con sứa, 2 con cá heo, 3 con sao biển, 4 con cá hề không?", 
                fact: "Dive in and find your friends!" 
            }
        ];

        const quizQuestions = [
            { q: "Which animal changes colors to match its home? 🎨", ans: "octopus" },
            { q: "Which animal holds on to coral with its tail? 🌿", ans: "seahorse" },
            { q: "Which animal has points called rays? ⭐", ans: "seastar" },
            { q: "What animal hides inside a sea anemone? 🐠", ans: "clownfish" },
            { q: "Which animal uses long tentacles to catch fish? 🌊", ans: "jellyfish" }
        ];

        // --- SPEECH API ---
        function speak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US'; u.rate = 0.85;
            window.speechSynthesis.speak(u);
        }

        // --- TAB MANAGEMENT ---
        function switchTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(id === 'game') initGame();
        }

        // --- READ TAB LOGIC ---
        let currCard = 0;
        let showVi = false;

        function renderCard() {
            const data = oceanData[currCard];
            document.getElementById('page-indicator').innerText = `Animal ${currCard + 1} / ${oceanData.length}`;
            document.getElementById('animal-icon').innerText = data.icon;
            document.getElementById('en-text').innerText = data.en;
            document.getElementById('vi-text').innerText = data.vi_sentence;
            
            const badge = document.getElementById('fact-badge');
            if(data.fact) {
                badge.style.display = 'block';
                badge.innerText = `💡 ${data.fact}`;
            } else {
                badge.style.display = 'none';
            }
            updateViVisibility();
        }

        function toggleVi() { showVi = !showVi; updateViVisibility(); }
        function updateViVisibility() {
            const viEl = document.getElementById('vi-text');
            if(showVi) viEl.classList.add('show'); else viEl.classList.remove('show');
        }

        function nextCard() { currCard = (currCard + 1) % oceanData.length; showVi = false; renderCard(); }
        function prevCard() { currCard = (currCard - 1 + oceanData.length) % oceanData.length; showVi = false; renderCard(); }
        function readText() { 
            let txt = oceanData[currCard].en + ". " + oceanData[currCard].fact;
            speak(txt); 
        }
        function boop() {
            const icon = document.getElementById('animal-icon');
            icon.style.transform = 'scale(1.2) translateY(-10px)';
            setTimeout(() => icon.style.transform = 'scale(1) translateY(0)', 300);
            speak(oceanData[currCard].w);
        }

        // --- VOCAB TAB LOGIC ---
        const vocabContainer = document.getElementById('vocab-container');
        oceanData.forEach(item => {
            const div = document.createElement('div');
            div.className = 'flip-card';
            div.innerHTML = `
                <div class="flip-card-inner">
                    <div class="flip-front">
                        <div style="font-size: 3.5rem; margin-bottom: 5px;">${item.icon}</div>
                        <h3 style="color: var(--primary-dark); font-size: 1.1rem; font-weight: 900;">${item.w}</h3>
                        <button class="btn btn-outline" style="position: absolute; top: 8px; right: 8px; padding: 4px; border-radius: 50%; min-width: 32px; box-shadow: 0 2px 0 var(--primary-dark);" onclick="event.stopPropagation(); speak('${item.w}')">🔊</button>
                    </div>
                    <div class="flip-back">
                        <h3 style="font-size: 1.3rem;">${item.vi}</h3>
                    </div>
                </div>`;
            div.onclick = () => div.classList.toggle('flipped');
            vocabContainer.appendChild(div);
        });

        // --- GAME TAB LOGIC ---
        let currQuiz = 0;
        let shuffledQuiz = [];

        function initGame() {
            shuffledQuiz = [...quizQuestions].sort(() => Math.random() - 0.5);
            currQuiz = 0;
            document.getElementById('bubble-container').style.display = 'none';
            loadQuiz();
        }

        function loadQuiz() {
            if(currQuiz >= shuffledQuiz.length) {
                document.getElementById('quiz-question').innerText = "🏆 You are an Ocean Explorer! 🏆";
                document.getElementById('quiz-options').innerHTML = '';
                triggerBubbles();
                speak("Great job! You are an ocean explorer!");
                return;
            }

            const q = shuffledQuiz[currQuiz];
            document.getElementById('quiz-question').innerText = q.q;
            speak(q.q);

            const optionsGrid = document.getElementById('quiz-options');
            optionsGrid.innerHTML = '';
            
            let opts = oceanData.filter(v => v.id !== "schoolfish" && v.id !== "activity").map(v => v.id);
            opts = opts.sort(() => Math.random() - 0.5).slice(0, 4);
            if(!opts.includes(q.ans)) opts[0] = q.ans; 
            opts.sort(() => Math.random() - 0.5); 

            opts.forEach(optId => {
                const vData = oceanData.find(v => v.id === optId);
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.innerHTML = `${vData.icon}<span>${vData.w}</span>`;
                btn.onclick = () => checkAnswer(btn, optId, q.ans);
                optionsGrid.appendChild(btn);
            });
        }

        function checkAnswer(btn, selected, correct) {
            if(selected === correct) {
                btn.classList.add('correct');
                speak("Correct!");
                setTimeout(() => { currQuiz++; loadQuiz(); }, 1200);
            } else {
                btn.classList.add('wrong');
                speak("Try again!");
                setTimeout(() => btn.classList.remove('wrong'), 500);
            }
        }

        function triggerBubbles() {
            const container = document.getElementById('bubble-container');
            container.innerHTML = '';
            container.style.display = 'block';
            for(let i=0; i<40; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                const size = Math.random() * 30 + 10;
                bubble.style.width = `${size}px`;
                bubble.style.height = `${size}px`;
                bubble.style.left = `${Math.random() * 100}vw`;
                bubble.style.animationDuration = `${Math.random() * 3 + 2}s`;
                bubble.style.animationDelay = `${Math.random() * 1}s`;
                container.appendChild(bubble);
            }
        }

        // Initialize App
        renderCard();
    </script>
</body>
</html>
