<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ocean - National Geographic Kids</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Comic+Neue:wght@700&display=swap');

        :root {
            --primary: #0284c7; /* Ocean Blue */
            --primary-light: #e0f2fe;
            --primary-dark: #0f172a; 
            --secondary: #f43f5e; /* Coral Pink */
            --accent: #fde047; /* Sand Yellow */
            --bg-color: #bae6fd;
            --text-main: #0f172a;
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { 
            background: linear-gradient(180deg, #38bdf8 0%, #0369a1 100%);
            color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        header {
            background: rgba(2, 132, 199, 0.85); backdrop-filter: blur(10px);
            color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 10;
        }
        header h1 { font-family: 'Comic Neue', cursive; font-size: 1.8rem; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); }

        main { flex: 1; overflow-y: auto; padding: 15px 15px 130px 15px; display: flex; flex-direction: column; align-items: center; }
        
        .section { display: none; width: 100%; max-width: 500px; animation: slideUp 0.4s ease-out forwards; }
        .section.active { display: flex; flex-direction: column; align-items: center; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .btn {
            background: var(--accent); color: var(--primary-dark); border: none; padding: 12px 20px;
            border-radius: 25px; font-weight: 900; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 4px 0 #ca8a04; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-outline { background: white; color: var(--primary); border: 2px solid var(--primary); box-shadow: 0 4px 0 var(--primary-dark); }

        /* --- FLASHCARD --- */
        .flashcard {
            background: var(--card-bg); border-radius: 30px; padding: 25px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 6px solid var(--primary-light);
            position: relative; min-height: 560px; display: flex; flex-direction: column; align-items: center;
        }
        
        .fact-bubble {
            background: #fef08a; color: #854d0e; padding: 10px 15px; border-radius: 20px; font-weight: 800;
            font-size: 0.95rem; border: 2px dashed #eab308; margin-bottom: 10px; font-style: italic; line-height: 1.3;
        }

        .animal-icon { font-size: 6.5rem; margin: 5px 0 10px 0; cursor: pointer; transition: transform 0.3s; }
        
        .name-badge-btn { 
            font-size: 1.1rem; color: white; background: var(--primary); padding: 12px 25px; 
            border-radius: 25px; font-weight: 900; margin-bottom: 15px; 
            box-shadow: 0 4px 0 var(--primary-dark); cursor: pointer; border: none;
            display: inline-flex; align-items: center; gap: 10px;
        }

        .en-text { font-size: 1.35rem; font-weight: 900; color: var(--primary-dark); line-height: 1.5; margin-bottom: 10px; text-align: left; width: 100%; }
        .vi-text { font-size: 1.2rem; font-weight: 700; color: #0284c7; margin-bottom: 20px; display: none; line-height: 1.4; border-top: 1px dashed #cbd5e1; padding-top: 10px; text-align: left; width: 100%; }
        .vi-text.show { display: block; }

        /* --- VOCAB GRID --- */
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 15px; width: 100%; }
        .flip-card { background-color: transparent; height: 210px; perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-front, .flip-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.15); border: 3px solid var(--primary-light); background: white;
        }
        .flip-back { background: var(--primary-light); color: var(--primary-dark); transform: rotateY(180deg); border-color: var(--primary); }
        
        /* --- BOTTOM NAV --- */
        nav {
            position: fixed; bottom: 0; width: 100%; background: white; border-top: 3px solid var(--accent);
            display: flex; justify-content: space-around; padding: 10px 10px 35px 10px; box-shadow: 0 -4px 20px rgba(0,0,0,0.15); z-index: 100;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 0.9rem; font-weight: 900; flex: 1; cursor: pointer; gap: 4px; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 1.5rem; padding: 5px 20px; border-radius: 12px; transition: 0.3s; }
        .nav-item.active .nav-icon { background: var(--primary-light); transform: translateY(-3px); color: var(--primary-dark); border: 2px solid var(--primary); }

        #bubble-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; }
        .bubble { position: absolute; bottom: -20px; background: rgba(255, 255, 255, 0.4); border-radius: 50%; animation: floatUp linear forwards; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120vh); opacity: 0; } }
    </style>
</head>
<body>

    <header>
        <h1>Ocean Explorer 🌊</h1>
    </header>

    <div id="bubble-container"></div>

    <main>
        <div id="tab-read" class="section active">
            <div style="text-align: center; margin-bottom: 10px; font-weight: 900; color: white;" id="page-indicator">Animal 1 / 11</div>
            <div class="flashcard">
                <div id="fact-badge" class="fact-bubble"></div>
                <div class="animal-icon" id="animal-icon" onclick="speakName()">🐠</div>
                
                <button id="name-badge" class="name-badge-btn" onclick="speakName()">
                    SEAHORSE /ˈsiː.hɔːs/ 🔊
                </button>

                <div class="en-text" id="en-text">English text here</div>
                <div class="vi-text" id="vi-text">Vietnamese text here</div>
                
                <div style="margin-top: auto; display: flex; gap: 10px; width: 100%;">
                    <button class="btn btn-outline" style="flex: 1; min-height: 55px;" onclick="toggleVi()">A/V 🌐</button>
                    <button class="btn" style="flex: 2; min-height: 55px;" onclick="readText()">🔊 Listen All</button>
                </div>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 20px; padding-bottom: 35px; width: 100%; gap: 15px;">
                <button class="btn btn-outline" style="flex: 1; min-height: 65px; background: rgba(255,255,255,0.9); color: var(--primary-dark);" onclick="prevCard()">⬅️ Back</button>
                <button class="btn btn-outline" style="flex: 1; min-height: 65px; background: rgba(255,255,255,0.9); color: var(--primary-dark);" onclick="nextCard()">Next ➡️</button>
            </div>
        </div>

        <div id="tab-vocab" class="section">
            <div class="vocab-grid" id="vocab-container"></div>
        </div>

        <div id="tab-game" class="section">
            <div class="question-box" style="background: white; padding: 20px; border-radius: 20px; border: 4px solid var(--secondary); text-align: center; font-size: 1.3rem; font-weight: 800; margin-bottom: 20px; color: var(--primary-dark);" id="quiz-question">Which animal is this?</div>
            <div class="vocab-grid" id="quiz-options" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
            <button class="btn" style="width: 100%; margin-top: 25px;" onclick="initGame()">Restart Game 🔄</button>
        </div>
    </main>

    <nav>
        <div class="nav-item active" onclick="switchTab('read', this)">
            <div class="nav-icon">📖</div><span>Read</span>
        </div>
        <div class="nav-item" onclick="switchTab('vocab', this)">
            <div class="nav-icon">🔤</div><span>Vocab</span>
        </div>
        <div class="nav-item" onclick="switchTab('game', this)">
            <div class="nav-icon">🎮</div><span>Game</span>
        </div>
    </nav>

    <script>
        const oceanData = [
            { id: "seahorse", w: "SEAHORSE", ipa: "/ˈsiː.hɔːs/", vi: "Cá ngựa", icon: "🐉", en: "The ocean is made of water. Many animals live in the ocean. A seahorse holds on to coral with its tail. I'm a fish that looks like a horse!", vi_sentence: "Đại dương được tạo nên từ nước. Có rất nhiều loài động vật sống ở đại dương. Một chú cá ngựa dùng đuôi bám chặt vào san hô. Tớ là loài cá trông giống ngựa đó!", fact: "Seahorses are slow swimmers." },
            { id: "penguin", w: "PENGUIN", ipa: "/ˈpeŋ.ɡwɪn/", vi: "Chim cánh cụt", icon: "🐧", en: "A penguin dives into the water. Whee! Dive into the deep blue!", vi_sentence: "Một chú chim cánh cụt lặn xuống nước. Whee! Hãy lặn xuống dòng nước xanh sâu thẳm nào!", fact: "Penguins cannot fly." },
            { id: "seastar", w: "SEA STAR", ipa: "/ˈsiː ˌstɑːr/", vi: "Sao biển", icon: "⭐", en: "A sea star climbs over coral. Each point of a sea star is called a ray.", vi_sentence: "Một con sao biển bò qua rặng san hô. Mỗi cánh của sao biển được gọi là một tia.", fact: "Sea stars can regrow lost arms." },
            { id: "seaturtle", w: "SEA TURTLE", ipa: "/ˈsiː ˌtɜː.təl/", vi: "Rùa biển", icon: "🐢", en: "Fish follow a sea turtle through a coral reef. Wait for me! A coral reef is home to many ocean animals.", vi_sentence: "Đàn cá bơi theo rùa biển qua rặng san hô. Đợi tớ với! Rặng san hô là nhà của rất nhiều loài vật.", fact: "Sea turtles can live over 50 years." },
            { id: "clownfish", w: "CLOWNFISH", ipa: "/ˈklaʊn.fɪʃ/", vi: "Cá hề", icon: "🐠", en: "Clownfish hide in a sea anemone. Hey, that tickles! Sea anemones are animals with many tentacles.", vi_sentence: "Cá hề trốn trong một bông hải quỳ. Này, nhột quá đi! Hải quỳ là động vật có rất nhiều xúc tu.", fact: "Clownfish are very colorful." },
            { id: "sealion", w: "SEA LION", ipa: "/ˈsiː ˌlaɪ.ən/", vi: "Sư tử biển", icon: "🦭", en: "Sea lions flap their front flippers to swim. Sea lions twist and turn through seaweed forests. A baby sea lion can swim as soon as it is born.", vi_sentence: "Sư tử biển đập hai chân chèo phía trước để bơi. Chúng xoay và lượn qua những khu rừng rong biển. Sư tử biển con có thể bơi ngay khi vừa chào đời.", fact: "Sea lions are very loud." },
            { id: "schoolfish", w: "SCHOOL OF FISH", ipa: "/skuːl əv fɪʃ/", vi: "Đàn cá", icon: "🐟", en: "Colorful fish swirl in schools. Is it time for recess? Swimming together helps the fish find food.", vi_sentence: "Những chú cá đầy màu sắc bơi thành đàn. Đã đến giờ ra chơi chưa nhỉ? Bơi cùng nhau giúp đàn cá tìm thức ăn.", fact: "A school can have thousands of fish." },
            { id: "jellyfish", w: "JELLYFISH", ipa: "/ˈdʒel.i.fɪʃ/", vi: "Sứa", icon: "🪼", en: "Jellyfish drift through the water. Jellyfish use their long tentacles to catch fish to eat.", vi_sentence: "Những chú sứa trôi lơ lửng trong nước. Sứa dùng những chiếc xúc tu dài của mình để bắt cá.", fact: "Jellyfish have no brains." },
            { id: "octopus", w: "OCTOPUS", ipa: "/ˈɒk.tə.pəs/", vi: "Bạch tuộc", icon: "🐙", en: "An octopus sneaks along the ocean floor. An octopus can change colors to match its home.", vi_sentence: "Bạch tuộc lẻn dọc theo đáy đại dương. Bạch tuộc có thể đổi màu để ngụy trang phù hợp với ngôi nhà của nó.", fact: "An octopus has three hearts." },
            { id: "walrus", w: "WALRUS", ipa: "/ˈwɔːl.rəs/", vi: "Hải mã", icon: "🦦", en: "Walruses climb onto ice to rest. Get ready for naptime! Stay warm on the cold ice.", vi_sentence: "Những chú hải mã trèo lên tảng băng để nghỉ ngơi. Sẵn sàng cho giờ đi ngủ thôi! Hãy giữ ấm trên tảng băng lạnh nhé.", fact: "Walruses have long tusks." },
            { id: "dolphin", w: "DOLPHIN", ipa: "/ˈdɒl.fɪn/", vi: "Cá heo", icon: "🐬", en: "Dolphins race and play underwater. Where would you explore in the ocean? Dive in and find your friends!", vi_sentence: "Cá heo đua nhau và vui đùa dưới nước. Bé sẽ khám phá nơi nào ở đại dương? Hãy lặn xuống và tìm bạn bè mình nhé!", fact: "Dolphins are very smart." }
        ];

        const quizQuestions = [
            { q: "Which animal changes colors to match its home? 🎨", ans: "octopus" },
            { q: "Which animal holds on to coral with its tail? 🐉", ans: "seahorse" },
            { q: "Which animal has points called rays? ⭐", ans: "seastar" },
            { q: "What animal hides inside a sea anemone? 🐠", ans: "clownfish" },
            { q: "Which animal has no brain and drifts in water? 🪼", ans: "jellyfish" }
        ];

        function speak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US'; u.rate = 0.85;
            window.speechSynthesis.speak(u);
        }

        let currCard = 0;
        let showVi = false;

        function renderCard() {
            const data = oceanData[currCard];
            document.getElementById('page-indicator').innerText = `Animal ${currCard + 1} / ${oceanData.length}`;
            document.getElementById('animal-icon').innerText = data.icon;
            document.getElementById('name-badge').innerHTML = `${data.w} ${data.ipa} 🔊`;
            document.getElementById('en-text').innerText = data.en;
            document.getElementById('vi-text').innerText = data.vi_sentence;
            
            const badge = document.getElementById('fact-badge');
            badge.style.display = data.fact ? 'block' : 'none';
            badge.innerText = `💡 ${data.fact}`;
            updateViVisibility();
        }

        function toggleVi() { showVi = !showVi; updateViVisibility(); }
        function updateViVisibility() {
            const viEl = document.getElementById('vi-text');
            viEl.classList.toggle('show', showVi);
        }

        function nextCard() { currCard = (currCard + 1) % oceanData.length; showVi = false; renderCard(); }
        function prevCard() { currCard = (currCard - 1 + oceanData.length) % oceanData.length; showVi = false; renderCard(); }
        
        function readText() { speak(oceanData[currCard].en); }
        function speakName() { speak(oceanData[currCard].w); }

        function switchTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(id === 'game') initGame();
        }

        const vocabContainer = document.getElementById('vocab-container');
        oceanData.forEach(item => {
            const div = document.createElement('div');
            div.className = 'flip-card';
            div.innerHTML = `
                <div class="flip-card-inner">
                    <div class="flip-front">
                        <div style="font-size: 3.5rem; margin-bottom: 5px;">${item.icon}</div>
                        <h3 style="font-weight: 900; font-size: 1.1rem;">${item.w}</h3>
                        <div style="color: #64748b; font-size: 0.85rem;">${item.ipa}</div>
                        <button style="position: absolute; top: 10px; right: 10px; border: none; background: none; font-size: 1.3rem;" onclick="event.stopPropagation(); speak('${item.w}')">🔊</button>
                    </div>
                    <div class="flip-back">
                        <h3 style="font-size: 1.3rem;">${item.vi}</h3>
                    </div>
                </div>`;
            div.onclick = () => div.classList.toggle('flipped');
            vocabContainer.appendChild(div);
        });

        let currQuiz = 0;
        let shuffledQuiz = [];

        function initGame() {
            shuffledQuiz = [...quizQuestions].sort(() => Math.random() - 0.5);
            currQuiz = 0;
            loadQuiz();
        }

        function loadQuiz() {
            const quizOptions = document.getElementById('quiz-options');
            if(currQuiz >= shuffledQuiz.length) {
                document.getElementById('quiz-question').innerText = "🏆 Ocean Expert! 🏆";
                quizOptions.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: white; font-size: 1.5rem; font-weight: 900;">You explored the whole ocean!</div>';
                triggerBubbles();
                return;
            }
            const q = shuffledQuiz[currQuiz];
            document.getElementById('quiz-question').innerText = q.q;
            speak(q.q);
            quizOptions.innerHTML = '';
            
            oceanData.filter(a => a.id !== "schoolfish").forEach(animal => {
                const btn = document.createElement('div');
                btn.style = "background: white; border: 3px solid var(--secondary); border-radius: 15px; padding: 15px; text-align: center; box-shadow: 0 4px 0 #94a3b8; cursor: pointer; color: var(--text-main);";
                btn.innerHTML = `<div style="font-size:2.5rem;">${animal.icon}</div><span style="font-weight:800; font-size:1rem;">${animal.w}</span>`;
                btn.onclick = () => {
                    if(animal.id === q.ans) {
                        btn.style.background = "#dcfce7"; btn.style.borderColor = "#22c55e";
                        speak("Correct!");
                        setTimeout(() => { currQuiz++; loadQuiz(); }, 1200);
                    } else {
                        btn.style.background = "#fee2e2"; btn.style.borderColor = "#ef4444";
                        speak("Try again!");
                        setTimeout(() => { btn.style.background = "white"; btn.style.borderColor = "var(--secondary)"; }, 500);
                    }
                };
                quizOptions.appendChild(btn);
            });
        }

        function triggerBubbles() {
            const container = document.getElementById('bubble-container');
            container.innerHTML = '';
            for(let i=0; i<30; i++) {
                const el = document.createElement('div');
                el.className = 'bubble';
                const size = Math.random() * 30 + 10;
                el.style.width = `${size}px`;
                el.style.height = `${size}px`;
                el.style.left = `${Math.random() * 100}vw`;
                el.style.animationDuration = `${Math.random() * 3 + 2}s`;
                container.appendChild(el);
            }
        }
        renderCard();
    </script>
</body>
</html>
