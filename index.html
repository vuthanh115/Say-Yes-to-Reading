<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Say Yes to Reading - Collection</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Comic+Neue:wght@700&display=swap');

        :root {
            --primary: #4f46e5;
            --primary-light: #e0e7ff;
            --primary-dark: #312e81;
            --bg-gradient: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%);
            --text-main: #1e1b4b;
            --card-bg: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 15px;
            overflow-x: hidden;
        }

        header { text-align: center; margin-bottom: 40px; z-index: 10; }
        header h1 { font-family: 'Comic Neue', cursive; font-size: 2.5rem; color: var(--primary-dark); margin-bottom: 10px; }
        header p { font-size: 1.1rem; font-weight: 700; opacity: 0.8; }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
            z-index: 10;
        }

        .book-card {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 30px 20px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.1);
            border: 2px solid white;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .book-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 35px rgba(79, 70, 229, 0.2);
            border-color: var(--primary-light);
        }

        .card-icon { font-size: 4.5rem; margin-bottom: 20px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }
        .card-title { font-size: 1.4rem; font-weight: 800; color: var(--primary-dark); margin-bottom: 15px; min-height: 3.5rem; display: flex; align-items: center; }
        
        .btn-open {
            background: var(--primary);
            color: white;
            padding: 10px 25px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 1rem;
            transition: 0.2s;
            box-shadow: 0 4px 0 var(--primary-dark);
        }
        .book-card:hover .btn-open { background: var(--primary-dark); }

        /* --- DECORATIONS --- */
        .shape { position: fixed; z-index: 1; opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <header>
        <h1>My Reading Library 📚</h1>
        <p>Chọn một cuốn sách để bắt đầu khám phá!</p>
    </header>

    <div class="book-grid">
        
        <a href="AnimalsOnTheGo.html" class="book-card">
            <div class="card-icon">🐆</div>
            <div class="card-title">Animals on the Go</div>
            <div class="btn-open">Open Book</div>
        </a>

        <a href="LetsGo.html" class="book-card">
            <div class="card-icon">🚀</div>
            <div class="card-title">Let's Go!</div>
            <div class="btn-open">Open Book</div>
        </a>

        <a href="OceanApp.html" class="book-card">
            <div class="card-icon">🌊</div>
            <div class="card-title">Ocean Explorer</div>
            <div class="btn-open">Open Book</div>
        </a>

        <a href="TrucksApp.html" class="book-card">
            <div class="card-icon">🚛</div>
            <div class="card-title">Trucks!</div>
            <div class="btn-open">Open Book</div>
        </a>

        <a href="BedtimeApp.html" class="book-card">
            <div class="card-icon">🌙</div>
            <div class="card-title">Bedtime Stories</div>
            <div class="btn-open">Open Book</div>
        </a>

        <a href="FarmAnimals.html" class="book-card">
            <div class="card-icon">🐄</div>
            <div class="card-title">Farm Animals</div>
            <div class="btn-open">Open Book</div>
        </a>

    </div>

</body>
</html>
